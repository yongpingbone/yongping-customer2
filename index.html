function getNextTime(timeStr,steps){
  const idx=TIMES.indexOf(timeStr);
  if(idx===-1)return null;
  const next=TIMES[idx+steps];
  return next||null;
}
function parseInput(s){
  const m=s.trim().match(/^(.+?)(\d{4,})(.*)$/);
  return m?{name:(m[1]+(m[3]||"")).trim(),phone:m[2]}:{name:s.trim(),phone:""};
}
function displayName(n){if(!n)return"";const m=n.trim().match(/^([^0-9]+?)([0-9R][0-9]{3,}).*/);return m?m[1].trim():n.trim();}
function getWeeksMon(y,m,showSun){
  const dim=new Date(y,m+1,0).getDate();
  const off=new Date(y,m,1).getDay();
  const offset=off===0?6:off-1;
  const weeks=[];let d=1-offset;
  while(d<=dim){
    const w=[];
    for(let i=0;i<7;i++){w.push(d>=1&&d<=dim?d:null);d++;}
    weeks.push(showSun?w:w.slice(0,6));
  }
  return weeks;
}
function getWeeksSun(y,m){
  const dim=new Date(y,m+1,0).getDate();
  const off=new Date(y,m,1).getDay();
  const weeks=[];let d=1-off;
  while(d<=dim){
    const w=[];
    for(let i=0;i<7;i++){w.push(d>=1&&d<=dim?d:null);d++;}
    weeks.push(w);
  }
  return weeks;
}
function daysBetween(a,b){return Math.floor((new Date(b)-new Date(a))/(1000*60*60*24));}

// CUSTOMER AUTOCOMPLETE HOOK
// ═══════════════════════════════════════════
function useCustomerSuggest(inputValue, enabled=true, masterId=null, masters=[]){
  const[suggestions,setSuggestions]=useState([]);
  const[showSug,setShowSug]=useState(false);
  const timerRef=useRef(null);

  useEffect(()=>{
    if(!enabled){setSuggestions([]);setShowSug(false);return;}
    const q=inputValue.trim();
    const hasPhone=/\d{4,}/.test(q);
    if(!q||hasPhone){setSuggestions([]);setShowSug(false);return;}
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(async()=>{
      try{
        // 1. 從 customers 撈出符合姓名/電話的客戶
        const{data:custData}=await sb.from("customers")
          .select("name,phone")
          .or(`name.ilike.%${q}%,phone.ilike.%${q}%`)
          .order("last_visit_date",{ascending:false})
          .limit(15);
        if(!custData||custData.length===0){setSuggestions([]);setShowSug(false);return;}

        // 2. 逐一查每位客戶最近一筆有效預約，找出被分配到哪位師傅
        // 優先用電話查，沒電話或查無結果就用姓名查
        const enriched=await Promise.all(custData.map(async(c)=>{
          try{
            let bkData=null;
            if(c.phone){
              const{data:d1}=await sb.from("bookings").select("master_id").eq("customer_phone",c.phone).neq("status","cancelled").neq("color_tag","vacation").order("date",{ascending:false}).order("start_time",{ascending:false}).limit(1);
              bkData=d1;
            }
            if((!bkData||bkData.length===0)&&c.name){
              const{data:d2}=await sb.from("bookings").select("master_id").ilike("customer_name",`${c.name}%`).neq("status","cancelled").neq("color_tag","vacation").order("date",{ascending:false}).order("start_time",{ascending:false}).limit(1);
              bkData=d2;
            }
            if(bkData&&bkData.length>0){
              const mid=bkData[0].master_id;
              const mName=masters.find(m=>m.id===mid)?.name||"";
              return{...c,_masterName:mName,_masterId:mid};
            }
          }catch(e){}
          return{...c,_masterName:"",_masterId:null};
        }));

        // 3. 排序：目前師傅的客戶優先顯示，其次按原來順序
        // 確保其他師傅的客人也一定出現（最多3個本師傅 + 剩餘給其他師傅）
        const ownList=enriched.filter(a=>a._masterId===masterId);
        const otherList=enriched.filter(a=>a._masterId!==masterId);
        const sorted=[...ownList.slice(0,4),...otherList.slice(0,4)].slice(0,8);

        setSuggestions(sorted);setShowSug(true);
      }catch(e){setSuggestions([]);setShowSug(false);}
    },200);
    return()=>clearTimeout(timerRef.current);
  },[inputValue,enabled,masterId]);

  const dismiss=useCallback(()=>{setShowSug(false);},[]);
  return{suggestions,showSug,dismiss,setSuggestions,setShowSug};
}

// UPDATE PASSWORD SCREEN (首次登入)
// ═══════════════════════════════════════════
function UpdatePasswordScreen({masterName,onDone}){
  const[newPw,setNewPw]=useState("");
  const[confirm,setConfirm]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[showPw,setShowPw]=useState(false);

  const doUpdate=async()=>{
    if(newPw.length<6){setError("密碼至少需要 6 個字元");return;}
    if(newPw!==confirm){setError("兩次密碼不一致");return;}
    setLoading(true);setError("");
    // 1. 更新 Supabase Auth 密碼
    const{error:authErr}=await sb.auth.updateUser({password:newPw});
    if(authErr){setError("更新失敗："+authErr.message);setLoading(false);return;}
    // 2. 更新 masters 表標記
    const{data:{user}}=await sb.auth.getUser();
    if(user){
      const uname=user.email.replace("@yongping.com","");
      await sb.from("masters").update({is_first_login:false}).eq("username",uname);
    }
    setLoading(false);
    onDone();
  };

  return(
  <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0d1117",padding:"0 24px"}}>
    <div style={{width:"100%",maxWidth:360}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:36,marginBottom:10}}>🔑</div>
        <div style={{fontSize:18,fontWeight:800,color:"#f0f6fc"}}>設定新密碼</div>
        <div style={{fontSize:12,color:"#8b949e",marginTop:6}}>嗨 {masterName}，首次登入請設定專屬密碼</div>
      </div>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:16,padding:24}}>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,color:"#8b949e",marginBottom:6,fontWeight:600}}>新密碼（至少 6 碼）</div>
          <div style={{position:"relative"}}>
            <input type={showPw?"text":"password"} value={newPw} onChange={e=>{setNewPw(e.target.value);setError("");}}
              placeholder="輸入新密碼..." autoComplete="new-password"
              style={{width:"100%",padding:"12px 44px 12px 14px",background:"#0d1117",border:"1px solid #30363d",borderRadius:10,color:"#f0f6fc",fontSize:16,boxSizing:"border-box"}}/>
            <button onClick={()=>setShowPw(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#8b949e",cursor:"pointer",fontSize:18,padding:0}}>{showPw?"🙈":"👁"}</button>
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,color:"#8b949e",marginBottom:6,fontWeight:600}}>確認新密碼</div>
          <input type="password" value={confirm} onChange={e=>{setConfirm(e.target.value);setError("");}}
            onKeyDown={e=>e.key==="Enter"&&doUpdate()}
            placeholder="再輸入一次..." autoComplete="new-password"
            style={{width:"100%",padding:"12px 14px",background:"#0d1117",border:"1px solid #30363d",borderRadius:10,color:"#f0f6fc",fontSize:16,boxSizing:"border-box"}}/>
        </div>
        {error&&<div style={{background:"rgba(233,69,96,0.12)",border:"1px solid rgba(233,69,96,0.4)",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:13,color:"#e94560",textAlign:"center"}}>{error}</div>}
        <button onClick={doUpdate} disabled={loading||!newPw||!confirm}
          style={{width:"100%",padding:14,borderRadius:10,background:loading||!newPw||!confirm?"#21262d":"#e94560",border:"none",color:loading||!newPw||!confirm?"#666":"#fff",fontSize:16,fontWeight:700,cursor:loading?"wait":"pointer"}}>
          {loading?"更新中...":"確認設定"}
        </button>
      </div>
    </div>
  </div>
  );
}

function SplitMasterSelect({masters, dialogMasterId, dateStr, time, value, onChange}){
  const[avail,setAvail]=React.useState({});

  React.useEffect(()=>{
    if(!dateStr||!time) return;
    const filtered=masters.filter(m=>m.id!==dialogMasterId&&m.name!=="Hanna"&&m.username!=="hanna");
    filtered.forEach(async m=>{
      const{data}=await sb.from("bookings")
        .select("id,customer_name")
        .eq("master_id",m.id)
        .eq("date",dateStr)
        .eq("start_time",time+":00")
        .neq("status","cancelled")
        .neq("color_tag","vacation")
        .limit(1);
      setAvail(prev=>({...prev,[m.id]:data&&data.length>0?data[0].customer_name:null}));
    });
  },[dialogMasterId,dateStr,time]);

  const filtered=masters.filter(m=>m.id!==dialogMasterId&&m.name!=="Hanna"&&m.username!=="hanna");

  return<div style={{marginTop:6}}>
    {filtered.map(m=>{
      const conflict=avail[m.id];
      const isSelected=value===m.id;
      const hasConflict=conflict!==undefined&&conflict!==null;
      return<div key={m.id} onClick={()=>onChange(m.id)}
        style={{
          display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
          borderRadius:8,marginBottom:6,cursor:"pointer",
          background:isSelected?"rgba(116,185,255,0.15)":"var(--input-bg)",
          border:`1.5px solid ${isSelected?"#74b9ff":hasConflict?"rgba(233,69,96,0.4)":"var(--border2)"}`,
          transition:".15s"
        }}>
        <div style={{
          width:10,height:10,borderRadius:"50%",flexShrink:0,
          background:avail[m.id]===undefined?"#555":hasConflict?"#e94560":"#00b894"
        }}/>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:isSelected?"#74b9ff":"var(--text-main)"}}>{m.name}</div>
          {hasConflict&&<div style={{fontSize:11,color:"#e94560",marginTop:1}}>已有：{conflict}</div>}
          {!hasConflict&&avail[m.id]!==undefined&&<div style={{fontSize:11,color:"#00b894",marginTop:1}}>空位</div>}
          {avail[m.id]===undefined&&<div style={{fontSize:11,color:"#555",marginTop:1}}>查詢中...</div>}
        </div>
        {isSelected&&<span style={{color:"#74b9ff",fontSize:14}}>✓</span>}
      </div>;
    })}
  </div>;
}

function App(){
  const today=getTaipeiNow();
  const isMobile=window.innerWidth<=768;
  const[theme,setTheme]=useLS("yp_theme","dark");
  const[fontSize,setFs]=useLS("yp_fs",isMobile?"sm":"md");
  const[colW,setColW]=useLS("yp_cw",isMobile?"60":"85");
  const[rowH,setRowH]=useLS("yp_rh",isMobile?"24":"26");
  const[ovColW,setOvColW]=useLS("yp_ov_cw","75");
  const[ovRowH,setOvRowH]=useLS("yp_ov_rh","24");
  const[showSun,setShowSun]=useLS("yp_showsun","0");
  const cw=parseInt(colW)||85;
  const rh=parseInt(rowH)||26;
  const FS={sm:{b:9,n:10,t:9,s:8},md:{b:11,n:11,t:10,s:9},lg:{b:13,n:13,t:11,s:10}}[fontSize]||{b:11,n:11,t:10,s:9};
  useEffect(()=>{document.body.className=theme;},[theme]);

  // ── Auth ──
  const[authMaster,setAuthMaster]=useState(null);
  const[authChecked,setAuthChecked]=useState(false);
  const[isFirstLogin,setIsFirstLogin]=useState(false);

  useEffect(()=>{
    // 用 Supabase Auth 的 session 恢復登入狀態
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){
        const uname=session.user.email.replace("@yongping.com","");
        const{data}=await sb.from("masters").select("*").eq("username",uname).eq("is_active",true).single();
        if(data){setAuthMaster(data);setIsFirstLogin(!!data.is_first_login);}
      }
      setAuthChecked(true);
    });
    // 監聽 Auth 狀態變化
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(event==="SIGNED_OUT"){setAuthMaster(null);setIsFirstLogin(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleLogin=(masterData)=>{setAuthMaster(masterData);setIsFirstLogin(!!masterData.is_first_login);};
  const handleLogout=async()=>{await sb.auth.signOut();setAuthMaster(null);};
  const handlePasswordUpdated=()=>{setIsFirstLogin(false);};

  // 未登入 → 顯示登入畫面
  if(!authChecked)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0d1117",color:"#666",fontSize:14}}>載入中...</div>;
  if(!authMaster)return<LoginScreen onLogin={handleLogin}/>;
  if(isFirstLogin)return<UpdatePasswordScreen masterName={authMaster.name} onDone={handlePasswordUpdated}/>;
  return<MainApp authMaster={authMaster} onLogout={handleLogout} />;
}

  // ── Touch drag for cards (optimized: ghost via ref, no setState on every move) ──
  const createGhost=(name,x,y)=>{
    let g=document.createElement("div");
    g.id="drag-ghost";
    g.textContent=name;
    Object.assign(g.style,{position:"fixed",left:x+"px",top:y+"px",transform:"translate(-50%,-130%)",pointerEvents:"none",zIndex:"9999",background:"#74b9ff",border:"2px solid #fff",borderRadius:"8px",padding:"5px 12px",color:"#fff",fontWeight:"700",fontSize:"13px",boxShadow:"0 4px 16px rgba(0,0,0,0.4)",whiteSpace:"nowrap",transition:"none"});
    document.body.appendChild(g);
    ghostRef.current=g;
  };
  const moveGhost=(x,y)=>{
    if(!ghostRef.current)return;
    ghostRef.current.style.left=x+"px";
    ghostRef.current.style.top=y+"px";
  };
  const removeGhost=()=>{
    if(ghostRef.current){ghostRef.current.remove();ghostRef.current=null;}
  };

  const handleTouchStart=(e,booking)=>{
    if(!moveMode)return; // 需要開啟🔀移動模式才能拖曳
    e.stopPropagation();
    const t=e.touches[0];
    touchStartPos.current={x:t.clientX,y:t.clientY};
    longPressTimer.current=setTimeout(()=>{
      touchDragBookingRef.current=booking;
      setIsDragActive(true);
      createGhost(booking.customer_name,touchStartPos.current.x,touchStartPos.current.y);
      if(navigator.vibrate)navigator.vibrate(40);
    },600);
  };
  const handleGlobalTouchMove=(e)=>{
    const t=e.touches[0];
    if(isDragActive){
      e.preventDefault();
      moveGhost(t.clientX,t.clientY);
      // 用 ref 記錄目標格，不觸發 re-render
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const td=el?.closest("td[data-cellkey]");
      dragOverRef.current=td?.dataset.cellkey||null;
      // 高亮目標格（直接操作 DOM，零 re-render）
      document.querySelectorAll("td[data-cellkey].drag-over-active").forEach(x=>{x.classList.remove("drag-over-active");x.style.outline="";});
      if(td){td.classList.add("drag-over-active");td.style.outline="2px solid #74b9ff";}
      return;
    }
    if(touchStartPos.current){
      const dx=Math.abs(t.clientX-touchStartPos.current.x);
      const dy=Math.abs(t.clientY-touchStartPos.current.y);
      if(dx>14||dy>14){clearTimeout(longPressTimer.current);touchStartPos.current=null;}
    }
  };
  const handleGlobalTouchEnd=async(e)=>{
    clearTimeout(longPressTimer.current);
    touchStartPos.current=null;
    document.querySelectorAll("td[data-cellkey].drag-over-active").forEach(x=>{x.classList.remove("drag-over-active");x.style.outline="";});
    removeGhost();
    if(!isDragActive||!touchDragBookingRef.current){
      setIsDragActive(false);touchDragBookingRef.current=null;dragOverRef.current=null;return;
    }
    const bkg=touchDragBookingRef.current;
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const td=el?.closest("td[data-cellkey]");
    setIsDragActive(false);touchDragBookingRef.current=null;dragOverRef.current=null;
    if(td?.dataset.cellkey){const[dStr,tStr]=td.dataset.cellkey.split("__");if(dStr&&tStr)await processDrop(bkg,dStr,tStr);}
  };

  // Vacation drag

  // ── 搜尋功能 ──
  const doSearch=async(q)=>{

  // ── 執行上一步還原 ──
  const executeUndo=async()=>{
    if(!undoStack.length)return;
    const[top,...rest]=undoStack;
    const{action,...data}=top.snapshot;
    const editorName=(loginMaster||master)?.name||"系統";
    const nowStr=new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei",hour:"2-digit",minute:"2-digit"});
    let ok=false;
    let affectedId=null;
    if(action==="delete_ids"){
      const{error}=await sb.from("bookings").delete().in("id",data.ids);
      ok=!error;affectedId=data.ids[0];
    }else if(action==="reinsert"){
      const{data:ins,error}=await sb.from("bookings").insert(data.row).select().single();
      ok=!error;if(ins)affectedId=ins.id;
    }else if(action==="restore_status"){
      const{error}=await sb.from("bookings").update({status:data.status}).eq("id",data.id);
      ok=!error;affectedId=data.id;
    }else if(action==="update_datetime"){
      const{error}=await sb.from("bookings").update({date:data.date,start_time:data.start_time}).eq("id",data.id);
      ok=!error;affectedId=data.id;
    }
    if(ok){
      // 寫入歷史紀錄：還原操作
      if(affectedId){
        await saveEditLog(affectedId,editorName,`【還原】${top.desc}（${nowStr}）`);
      }
      setUndoStack(rest);msg(`✅ 已還原：${top.desc}`);loadBk();
    }else msg("還原失敗",true);
  };

  const getDayStats=(d)=>{
    if(!d)return{t:0,n:0};let t=0,n=0;
    TIMES.forEach(time=>{const b=bk(d,time);if(b&&(b.guest_count||0)>0&&b.color_tag!=="vacation"&&b.customer_name!=="休假"){t+=b.guest_count;if(b.color_tag==="new_customer")n+=b.guest_count;}});

            style={{padding:"13px 0",borderRadius:12,border:"1px solid #74b9ff",background:"rgba(116,185,255,0.1)",color:"#74b9ff",cursor:"pointer",fontSize:13,fontWeight:700}}>編輯</button>

            style={{padding:"14px 0",borderRadius:12,border:"2px solid #00b894",background:"rgba(0,184,148,0.12)",color:"#00b894",cursor:"pointer",fontSize:14,fontWeight:800}}>暫存（貼到其他格）</button>

    {/* 編輯預約 Modal */}
    {editForm&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={()=>setEditForm(null)}>

// ═══════════════════════════════════════════
// CUSTOMER OWNER PANEL — 個人頁客戶歸屬分區
// 上方：本師傅的客人（優先排序）
// 下方：其他師傅的客人（本月出現在此師傅排班中）
// ═══════════════════════════════════════════
function CustomerOwnerPanel({master,masters,year,month,FS,onClose}){
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!master)return;
    setLoading(true);
    const s=fmtDate(year,month,1);
    const e=fmtDate(year,month,new Date(year,month+1,0).getDate());
    (async()=>{
      // 撈本月此師傅所有預約
      const{data:bks}=await sb.from("bookings")
        .select("customer_name,customer_phone,date,start_time,color_tag")
        .eq("master_id",master.id)
        .gte("date",s).lte("date",e)
        .neq("status","cancelled").neq("status","no_show")
        .neq("color_tag","vacation")
        .order("date",{ascending:false}).order("start_time",{ascending:false});

      if(!bks||bks.length===0){setData({own:[],other:[]});setLoading(false);return;}

      // 去重（同客人只顯示最近一筆），並查此客人的原始師傅
      const seen=new Map();
      for(const b of bks){
        const phone=b.customer_phone||b.customer_name;
        if(!seen.has(phone))seen.set(phone,b);
      }
      const unique=[...seen.values()];

      // 並行查每位客人最近一筆有效預約（確認原本師傅）
      const enriched=await Promise.all(unique.map(async(b)=>{
        const phone=b.customer_phone;
        if(!phone)return{...b,_origMasterId:master.id,_origMasterName:master.name};
        try{
          const{data:prev}=await sb.from("bookings")
            .select("master_id")
            .eq("customer_phone",phone)
            .neq("status","cancelled").neq("color_tag","vacation")
            .order("date",{ascending:false}).order("start_time",{ascending:false})
            .limit(1);
          const origMid=prev&&prev[0]?prev[0].master_id:master.id;
          const origName=masters.find(m=>m.id===origMid)?.name||master.name;
          return{...b,_origMasterId:origMid,_origMasterName:origName};
        }catch(e){return{...b,_origMasterId:master.id,_origMasterName:master.name};}
      }));

      const own=enriched.filter(b=>b._origMasterId===master.id);
      const other=enriched.filter(b=>b._origMasterId!==master.id);
      setData({own,other});
      setLoading(false);
    })();
  },[master?.id,year,month]);

  const rowStyle={padding:"7px 12px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"default"};
  const nameStyle={fontSize:13,fontWeight:700,color:"var(--text-main)"};
  const phoneStyle={fontSize:11,color:"var(--text-dim)",fontFamily:"monospace",marginTop:1};
  const dateStyle={fontSize:11,color:"#74b9ff",textAlign:"right",flexShrink:0};

  return(
  <div style={{background:"var(--bg-sub)",borderTop:"2px solid var(--border2)",flexShrink:0,maxHeight:"45vh",overflowY:"auto"}}>
    <div style={{display:"flex",alignItems:"center",padding:"8px 14px",background:"var(--bg-header)",borderBottom:"1px solid var(--border2)",position:"sticky",top:0,zIndex:5}}>
      <span style={{fontSize:13,fontWeight:800,color:"var(--text-main)"}}>👤 客戶歸屬一覽　{year}/{month+1}</span>
      <button onClick={onClose} style={{marginLeft:"auto",background:"transparent",border:"none",color:"var(--text-muted)",fontSize:16,cursor:"pointer",padding:"0 4px"}}>✕</button>
    </div>
    {loading&&<div style={{padding:"16px",textAlign:"center",fontSize:12,color:"var(--text-dim)"}}>載入中...</div>}
    {!loading&&data&&<>
      {/* 上方：本師傅的客人 */}
      <div style={{padding:"6px 12px 4px",background:"rgba(0,184,148,0.08)",borderBottom:"1px solid var(--border)"}}>
        <span style={{fontSize:11,fontWeight:800,color:"#00b894"}}>✅ {master.name}師傅的客人　{data.own.length} 位</span>
      </div>
      {data.own.length===0&&<div style={{padding:"10px 14px",fontSize:12,color:"var(--text-dim)"}}>本月無固定客人</div>}
      {data.own.map((b,i)=>(
        <div key={i} style={{...rowStyle,background:"rgba(0,184,148,0.04)"}}>
          <div>
            <div style={nameStyle}>{displayName(b.customer_name)}
              {b.color_tag==="new_customer"&&<span style={{fontSize:10,color:"#f5a623",marginLeft:5}}>★新客</span>}
            </div>
            {b.customer_phone&&<div style={phoneStyle}>{b.customer_phone}</div>}
          </div>
          <div style={dateStyle}><div>{b.date}</div><div style={{color:"var(--text-time)",fontSize:10}}>{b.start_time?.slice(0,5)}</div></div>
        </div>
      ))}

      {/* 下方：其他師傅的客人（本月轉來） */}
      <div style={{padding:"6px 12px 4px",background:"rgba(245,166,35,0.08)",borderBottom:"1px solid var(--border)",borderTop:"2px solid var(--border2)"}}>
        <span style={{fontSize:11,fontWeight:800,color:"#f5a623"}}>🔁 其他師傅的客人（本月轉入）　{data.other.length} 位</span>
      </div>
      {data.other.length===0&&<div style={{padding:"10px 14px",fontSize:12,color:"var(--text-dim)"}}>無</div>}
      {data.other.map((b,i)=>(
        <div key={i} style={{...rowStyle}}>
          <div>
            <div style={nameStyle}>{displayName(b.customer_name)}
              {b.color_tag==="new_customer"&&<span style={{fontSize:10,color:"#f5a623",marginLeft:5}}>★新客</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,marginTop:2}}>
              {b.customer_phone&&<span style={phoneStyle}>{b.customer_phone}</span>}
              <span style={{fontSize:10,color:"#f5a623",background:"rgba(245,166,35,0.15)",borderRadius:4,padding:"1px 5px",fontWeight:700}}>原：{b._origMasterName}師傅</span>
            </div>
          </div>
          <div style={dateStyle}><div>{b.date}</div><div style={{color:"var(--text-time)",fontSize:10}}>{b.start_time?.slice(0,5)}</div></div>
        </div>
      ))}
    </>}
  </div>
  );
}

// OVERVIEW — 試算表一比一，週日→週六，每師傅一欄
// ═══════════════════════════════════════════
// 師傅欄位色彩系統 (依 master index j 循環)
// text: CSS variable (dark=亮色 / light=深色，確保黑白畫面皆可辨識)
// bgH: 師傅名稱列的強調背景; bg: 空格淡底色
const MASTER_TINTS=[
  {text:"var(--mt-0)", bg:"rgba(116,185,255,0.05)", bgH:"rgba(116,185,255,0.15)"},
  {text:"var(--mt-1)", bg:"rgba(46,217,195,0.05)",  bgH:"rgba(46,217,195,0.15)"},
  {text:"var(--mt-2)", bg:"rgba(255,169,77,0.05)",  bgH:"rgba(255,169,77,0.15)"},
  {text:"var(--mt-3)", bg:"rgba(218,119,242,0.05)", bgH:"rgba(218,119,242,0.15)"},
  {text:"var(--mt-4)", bg:"rgba(247,131,172,0.05)", bgH:"rgba(247,131,172,0.15)"},
];
function OverviewMonth({masters,ovMasters,setOvMasters,FS,ovColW,setOvColW,ovRowH,setOvRowH,onBookingAdded,loginMaster,undoStack,pushUndo,executeUndo}){
  const ocw=ovColW||75;const orh=ovRowH||22;
  const today=getTaipeiNow();
  const[yr,setYr]=useState(today.getFullYear());
  const[mo,setMo]=useState(today.getMonth());
  const[bks,setBks]=useState({});
  const[loading,setL]=useState(false);
  const[dialog,setDialog]=useState(null);
  const[form,setForm]=useState({input:"",guests:"1",note:"",color:"none"});
  const[saving,setSaving]=useState(false);
  const[toast,setToast]=useState(null);
  const[cpMode,setCpMode]=useState(null);
  const[cpTarget,setCpTarget]=useState({date:"",time:""});
  const[clipBoard,setClipBoard]=useState(null); // 暫存複製的預約，關掉後可貼上
  const[editForm,setEditForm]=useState(null); // 編輯預約用
  const[ovEditLogs,setOvEditLogs]=useState([]);
  const{suggestions:acSug,showSug:acShow,dismiss:acDismiss}=useCustomerSuggest(form.input,!!dialog,dialog?.masterId||null,masters);
  const[ovShowEditLogs,setOvShowEditLogs]=useState(false);
  const[ovCellHistory,setOvCellHistory]=useState(null);
  const[ovDragMode,setOvDragMode]=useState(false);
  const[ovMoveMode,setOvMoveMode]=useState(false); // 🔀 手機移動模式
  const[ovIsDraggingVac,setOvIsDraggingVac]=useState(false);
  const[ovDragCells,setOvDragCells]=useState(new Set());
  const[ovShowSlots,setOvShowSlots]=useState(false);
  const[ovSlotDate,setOvSlotDate]=useState(null);
  const[ovShowSearch,setOvShowSearch]=useState(false);
  const[ovSearchQ,setOvSearchQ]=useState("");
  const[ovSearchResults,setOvSearchResults]=useState([]);
  const[ovSearchLoading,setOvSearchLoading]=useState(false);
  const ovSearchInputRef=useRef(null);

  // Drag state (refs only for perf)
  const ovGhostRef=useRef(null);
  const ovDragBookingRef=useRef(null);
  const ovDragOverRef=useRef(null); // stores DOM element for visual highlight
  const ovDragOverKeyRef=useRef(null); // stores cellkey string for drop logic
  const ovLongPressTimer=useRef(null);
  const ovTouchStartPos=useRef(null);
  const[ovIsDragActive,setOvIsDragActive]=useState(false);
  const ovScrollRef=useRef(null);   // 全覽 scroll container
  const ovTodayRef=useRef(null);    // 全覽今日 W-row

  const sel=masters.filter(m=>ovMasters.includes(m.id)&&m.role!=="editor");
  const wks=getWeeksSun(yr,mo);
  const msg=(m,err)=>{setToast({m,err});setTimeout(()=>setToast(null),2800);};

  const loadBk=useCallback(async()=>{
    if(!ovMasters.length)return;
    setL(true);
    const lastDay=new Date(yr,mo+1,0).getDate();
    const s=fmtDate(yr,mo,1),e=fmtDate(yr,mo,lastDay);
    let all=[],from=0;
    while(true){
      const{data,error}=await sb.from("bookings").select("*").in("master_id",ovMasters).gte("date",s).lte("date",e).order("date").order("start_time").range(from,from+999);
      if(error||!data||data.length===0)break;
      all=[...all,...data];
      if(data.length<1000)break;
      from+=1000;
    }
    const m={};
    all.forEach(b=>{if(b.status!=="cancelled"&&b.status!=="no_show")m[`${b.master_id}__${b.date}__${b.start_time?.slice(0,5)}`]=b;});
    setBks(m);setL(false);
  },[ovMasters,yr,mo]);
  useEffect(()=>{loadBk();},[loadBk]);

  // 自動跳轉到今日：掛載時及切換回當月時觸發
  useEffect(()=>{
    const isCurrentMonth=yr===today.getFullYear()&&mo===today.getMonth();
    if(!isCurrentMonth)return;
    const container=ovScrollRef.current;
    if(!container)return;
    const doScroll=()=>{
      const el=ovTodayRef.current;
      if(!el)return;
      const top=container.scrollTop+el.getBoundingClientRect().top-container.getBoundingClientRect().top-8;
      container.scrollTo({top:Math.max(0,top),behavior:"smooth"});
    };
    const tid=setTimeout(doScroll,200);
    return()=>clearTimeout(tid);
  },[yr,mo]);

  const bk=(mid,d,t)=>d?bks[`${mid}__${fmtDate(yr,mo,d)}__${t}`]:null;
  const dStats=(mid,d)=>{
    if(!d)return{t:0,n:0};let t=0,n=0;
    TIMES.forEach(x=>{const b=bk(mid,d,x);if(b&&(b.guest_count||0)>0&&b.color_tag!=="vacation"&&b.customer_name!=="休假"){t+=b.guest_count;if(b.color_tag==="new_customer")n+=b.guest_count;}});
    return{t,n};
  };
  const wStats=(mid,wk)=>{let t=0,n=0;wk.forEach(d=>{if(d){const s=dStats(mid,d);t+=s.t;n+=s.n;}});return{t,n};};

  const openDlg=(m,d,t)=>{
    if(!d||!m)return;
    const dateStr=fmtDate(yr,mo,d);
    setDialog({master:m,masterId:m.id,dateStr,time:t});
    setForm({input:"",guests:"1",note:"",color:"none",isSplit:false,splitMasterId:""});
  };
  const COLOR_NO_INPUT=new Set(["reserved","custom","vacation"]);
  const saveBk=async(isContinuous=false)=>{
    const needInput=!COLOR_NO_INPUT.has(form.color);
    if(!dialog||(needInput&&!form.input.trim())||saving)return;
    setSaving(true);
    const colorLabels={reserved:"卡位",custom:"自訂",vacation:"休假"};
    const rawInput=form.input.trim()||colorLabels[form.color]||"";
    const{name,phone}=parseInput(rawInput);
    const noShowCount=await checkNoShow(phone);
    if(noShowCount>=5){
      if(!window.confirm(`⚠️ 此客戶 (${name}) 已累計放鳥 ${noShowCount} 次！確定要接受預約嗎？`)){setSaving(false);return;}
    }
    const conflict=await checkConflict(dialog.masterId,dialog.dateStr,dialog.time);
    if(conflict){
      if(!window.confirm(`該時段已有 [${conflict.customer_name}] 預約，確定要強制覆蓋嗎？`)){setSaving(false);return;}
      await sb.from("bookings").delete().eq("id",conflict.id);
    }
    const guestsNum=parseInt(form.guests);
    const rows=[{master_id:dialog.masterId,raw_input:rawInput,customer_name:name,customer_phone:phone||null,date:dialog.dateStr,start_time:dialog.time+":00",guest_count:1,color_tag:form.color,note:form.note||null,booking_source:"internal",status:"confirmed"}];
    if(guestsNum>1&&form.isSplit&&form.splitMasterId){
      const other=masters.find(m=>m.id===form.splitMasterId);
      if(other){
        const otherConflict=await checkConflict(other.id,dialog.dateStr,dialog.time);
        if(otherConflict){
          if(!window.confirm(`[${other.name}] 此時段已被 [${otherConflict.customer_name}] 佔用，確定覆蓋嗎？`)){setSaving(false);return;}
          await sb.from("bookings").delete().eq("id",otherConflict.id);
        }
        rows.push({master_id:other.id,raw_input:form.input,customer_name:`${name}-同行`,customer_phone:phone||null,date:dialog.dateStr,start_time:dialog.time+":00",guest_count:1,color_tag:form.color,note:"同行拆單",booking_source:"internal",status:"confirmed"});
      }
    }else if(guestsNum>1){
      // 不拆單：同師傅佔用連續時段，每位客人各佔一格
      for(let i=1;i<guestsNum;i++){
        const nextTime=getNextTime(dialog.time,i);
        if(nextTime){
          const slotConflict=await checkConflict(dialog.masterId,dialog.dateStr,nextTime);
          if(slotConflict){
            if(!window.confirm(`${nextTime} 時段已有 [${slotConflict.customer_name}]，確定覆蓋嗎？`)){setSaving(false);return;}
            await sb.from("bookings").delete().eq("id",slotConflict.id);
          }
          rows.push({master_id:dialog.masterId,raw_input:form.input,customer_name:`${name}-同行${guestsNum>2?i:""}`,customer_phone:phone||null,date:dialog.dateStr,start_time:nextTime+":00",guest_count:1,color_tag:form.color,note:form.note||null,booking_source:"internal",status:"confirmed"});
        }
      }
    }

        pushUndo(`新增 ${name} (${dialog.dateStr} ${dialog.time})`,{action:"delete_ids",ids:inserted.map(r=>r.id)});
        await saveEditLog(inserted[0].id,editorName,`【新增】${name} ${dialog.dateStr} ${dialog.time}（${nowStr}）`,{master_id:dialog.masterId,date:dialog.dateStr,start_time:dialog.time+":00"});
      }
      if(phone){
        const todayStr=getTaipeiNow().toISOString().slice(0,10);

      }
      msg(rows.length>1?"已成功建立多筆拆單預約！":"預約成功！");
      loadBk();if(onBookingAdded)onBookingAdded();
      setCrmKey(p=>p+1);
      if(isContinuous)setForm(f=>({...f,input:"",note:"",isSplit:false,splitMasterId:""}));

  };
  const delBk=async(id)=>{
    if(!window.confirm("確定要取消此預約嗎？"))return;

    const editorName=(loginMaster||master)?.name||"系統";
    const nowStr=new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei",hour:"2-digit",minute:"2-digit"});

  // ── 全覽拖曳（支援跨師傅）──
  const ovProcessDrop=async(booking,targetMasterId,targetDateStr,targetTimeStr)=>{
    const sameSlot=booking.date===targetDateStr&&booking.start_time.startsWith(targetTimeStr)&&booking.master_id===targetMasterId;
    if(sameSlot)return;
    const{data:conflict}=await sb.from("bookings").select("id,customer_name").eq("master_id",targetMasterId).eq("date",targetDateStr).eq("start_time",targetTimeStr+":00").neq("status","cancelled").neq("status","no_show").limit(1);
    if(conflict&&conflict.length>0){
      if(!window.confirm(`目標時段已有 [${conflict[0].customer_name}]，確定要覆蓋嗎？`))return;
      await sb.from("bookings").delete().eq("id",conflict[0].id);
    }
    const prevDate=booking.date;const prevTime=booking.start_time;const prevMasterId=booking.master_id;
    const updateObj={date:targetDateStr,start_time:targetTimeStr+":00",master_id:targetMasterId};
    const{error}=await sb.from("bookings").update(updateObj).eq("id",booking.id);
    if(!error){
      const targetMasterName=masters.find(m=>m.id===targetMasterId)?.name||"";
      const crossMaster=booking.master_id!==targetMasterId;
      if(pushUndo){
        const nowStr=new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei",hour:"2-digit",minute:"2-digit"});
        pushUndo(`移動 ${booking.customer_name} → 還原至 ${prevDate} ${prevTime?.slice(0,5)}`,{action:"update_datetime",id:booking.id,date:prevDate,start_time:prevTime,master_id:prevMasterId});
        await saveEditLog(booking.id,loginMaster?.name||"系統",`【移動】${booking.customer_name} ${prevDate} ${prevTime?.slice(0,5)} → ${targetDateStr} ${targetTimeStr}${crossMaster?` (${targetMasterName})`:""}（${nowStr}）`,{master_id:booking.master_id,date:targetDateStr,start_time:targetTimeStr+":00"});
      }
      msg(`✅ ${booking.customer_name} 已移至 ${targetDateStr} ${targetTimeStr}${crossMaster?` → ${targetMasterName}`:""}`)
      loadBk();if(onBookingAdded)onBookingAdded();
    }else msg("移動失敗",true);
  };

  const ovCreateGhost=(name,x,y)=>{
    let g=document.createElement("div");
    g.id="ov-drag-ghost";
    g.textContent=name;
    Object.assign(g.style,{position:"fixed",left:x+"px",top:y+"px",transform:"translate(-50%,-130%)",pointerEvents:"none",zIndex:"9999",background:"#a29bfe",border:"2px solid #fff",borderRadius:"8px",padding:"5px 12px",color:"#fff",fontWeight:"700",fontSize:"12px",boxShadow:"0 4px 16px rgba(0,0,0,0.4)",whiteSpace:"nowrap"});
    document.body.appendChild(g);
    ovGhostRef.current=g;
  };
  const ovMoveGhost=(x,y)=>{if(ovGhostRef.current){ovGhostRef.current.style.left=x+"px";ovGhostRef.current.style.top=y+"px";}};
  const ovRemoveGhost=()=>{if(ovGhostRef.current){ovGhostRef.current.remove();ovGhostRef.current=null;}};

  const ovHandleTouchStart=(e,booking)=>{
    if(!ovMoveMode)return; // 需要開啟🔀移動模式才能拖曳
    e.stopPropagation();
    const t=e.touches[0];
    ovTouchStartPos.current={x:t.clientX,y:t.clientY};
    ovLongPressTimer.current=setTimeout(()=>{
      ovDragBookingRef.current=booking;
      setOvIsDragActive(true);
      ovCreateGhost(booking.customer_name,ovTouchStartPos.current.x,ovTouchStartPos.current.y);
      if(navigator.vibrate)navigator.vibrate(40);
    },600);
  };
  const ovHandleTouchMove=(e)=>{
    const t=e.touches[0];
    if(ovIsDragActive){
      e.preventDefault();
      ovMoveGhost(t.clientX,t.clientY);
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const td=el?.closest("td[data-ovcellkey]");
      ovDragOverRef.current=td?.dataset.ovcellkey||null;
      document.querySelectorAll("td[data-ovcellkey].ov-drag-over").forEach(x=>{x.classList.remove("ov-drag-over");x.style.outline="";});
      if(td){td.classList.add("ov-drag-over");td.style.outline="2px solid #a29bfe";}
      return;
    }
    if(ovTouchStartPos.current){
      const dx=Math.abs(t.clientX-ovTouchStartPos.current.x);
      const dy=Math.abs(t.clientY-ovTouchStartPos.current.y);
      if(dx>14||dy>14){clearTimeout(ovLongPressTimer.current);ovTouchStartPos.current=null;}
    }
  };
  const ovHandleTouchEnd=async(e)=>{
    clearTimeout(ovLongPressTimer.current);
    ovTouchStartPos.current=null;
    document.querySelectorAll("td[data-ovcellkey].ov-drag-over").forEach(x=>{x.classList.remove("ov-drag-over");x.style.outline="";});
    ovRemoveGhost();
    if(!ovIsDragActive||!ovDragBookingRef.current){setOvIsDragActive(false);ovDragBookingRef.current=null;ovDragOverRef.current=null;ovDragOverKeyRef.current=null;return;}
    const bkg=ovDragBookingRef.current;
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const td=el?.closest("td[data-ovcellkey]");
    setOvIsDragActive(false);ovDragBookingRef.current=null;ovDragOverRef.current=null;ovDragOverKeyRef.current=null;
    if(td?.dataset.ovcellkey){
      const[mid,dStr,tStr]=td.dataset.ovcellkey.split("__");
      if(mid&&dStr&&tStr)await ovProcessDrop(bkg,mid,dStr,tStr);
    }
  };

  // ── 全覽搜尋 ──
  const ovDoSearch=async(q)=>{
    if(!q.trim()||!masters.length)return;
    setOvSearchLoading(true);
    const allMasterIds=masters.filter(m=>m.role!=="editor").map(m=>m.id);
    const isPhone=/\d{4,}/.test(q);
    let query=sb.from("bookings").select("*").in("master_id",allMasterIds).neq("status","cancelled").neq("color_tag","vacation").order("date",{ascending:false}).limit(80);
    if(isPhone){query=query.ilike("customer_phone",`%${q.trim()}%`);}
    else{query=query.ilike("customer_name",`%${q.trim()}%`);}
    const{data,error}=await query;
    if(error){console.error("Search error:",error);msg("搜尋失敗，請再試",true);}
    // 補上師傅名稱（從本地 masters 陣列查）
    const results=(data||[]).map(b=>({...b,_masterName:masters.find(m=>m.id===b.master_id)?.name||""}));
    setOvSearchResults(results);
    setOvSearchLoading(false);
  };
  const ovJumpToBooking=(b)=>{
    const[y,m,d]=b.date.split("-").map(Number);
    setYr(y);setMo(m-1);
    setOvShowSearch(false);setOvSearchQ("");setOvSearchResults([]);
    setTimeout(()=>{
      const container=ovScrollRef.current;if(!container)return;
      const wksLocal=getWeeksSun(y,m-1);
      const idx=wksLocal.findIndex(wk=>wk.includes(d));
      if(idx<0)return;
      const rows=container.querySelectorAll("tr");
      for(const row of rows){if(row.textContent.trimStart().startsWith(`W${idx+1}`)){row.scrollIntoView({behavior:"smooth",block:"center"});break;}}
    },600);
  };

  // ── Overview vacation drag ──
  const ovSaveDragVacation=async(cells)=>{

    if(!cellSet.size)return;
    const rows=[...cellSet].map(key=>{const[mid,dateStr,timeStr]=key.split("__");return{master_id:mid,raw_input:"休假",customer_name:"休假",customer_phone:null,date:dateStr,start_time:timeStr+":00",guest_count:0,color_tag:"vacation",note:null,status:"confirmed"};});
    for(const row of rows){
      await sb.from("bookings").delete().eq("master_id",row.master_id).eq("date",row.date).eq("start_time",row.start_time).neq("status","cancelled");
    }
    const{error}=await sb.from("bookings").insert(rows);
    setOvDragCells(new Set());setOvIsDraggingVac(false);
    if(!error){msg(`已標記 ${rows.length} 格休假`);loadBk();}
    else{msg("休假標記失敗",true);}
  };
  const onOvCellMouseDown=(cellKey,e)=>{
    if(e.shiftKey||ovDragMode){e.preventDefault();setOvIsDraggingVac(true);setOvDragCells(new Set([cellKey]));}
  };
  const onOvCellMouseEnter=(cellKey)=>{if(ovIsDraggingVac&&cellKey)setOvDragCells(prev=>new Set(prev).add(cellKey));};
  const onOvMouseUp=()=>{
    if(ovIsDraggingVac){
      if(ovDragCells.size>0)ovSaveDragVacation(ovDragCells);
      else{setOvIsDraggingVac(false);setOvDragCells(new Set());}
    }
  };

  const TT={padding:"2px 4px",background:"var(--bg-header)",borderBottom:"1px solid var(--border)",borderRight:"1px solid var(--border)",color:"var(--text-time)",fontSize:FS.t,fontWeight:700,position:"sticky",left:0,zIndex:5,minWidth:42,width:42,textAlign:"center",whiteSpace:"nowrap"};
  const totalCols=7*sel.length;

  return(
  <div style={{display:"flex",flexDirection:"column",height:"100%"}} onMouseUp={onOvMouseUp} onMouseLeave={onOvMouseUp} onTouchMove={ovIsDragActive?ovHandleTouchMove:undefined} onTouchEnd={ovHandleTouchEnd}>
    {toast&&<div style={{position:"fixed",top:12,left:"50%",transform:"translateX(-50%)",background:toast.err?"#e94560":"#00b894",color:"#fff",padding:"7px 18px",borderRadius:20,fontSize:12,fontWeight:700,zIndex:9999,maxWidth:"85vw",textAlign:"center"}}>{toast.m}</div>}
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:"var(--bg-header)",borderBottom:"1px solid var(--border2)",flexShrink:0,overflowX:"auto"}}>
      <button onClick={()=>{if(mo===0){setYr(y=>y-1);setMo(11);}else setMo(m=>m-1);}} className="nb">◀</button>
      <div style={{fontWeight:700,fontSize:FS.b+1}}>全覽　{yr}年{mo+1}月{loading&&<span style={{fontSize:9,color:"var(--text-dim)",marginLeft:6}}>載入中</span>}</div>
      <button onClick={()=>{if(mo===11){setYr(y=>y+1);setMo(0);}else setMo(m=>m+1);}} className="nb">▶</button>
      <div style={{display:"flex",gap:5,marginLeft:8}}>
        {masters.filter(m=>m.role!=="editor"&&m.name!=="Hanna"&&m.username!=="hanna").map(m=>(
          <button key={m.id} onClick={()=>setOvMasters(p=>p.includes(m.id)?p.filter(x=>x!==m.id):[...p,m.id])}
            style={{padding:"3px 10px",borderRadius:16,border:`1px solid ${ovMasters.includes(m.id)?"#e94560":"var(--border2)"}`,background:ovMasters.includes(m.id)?"#e9456022":"transparent",color:ovMasters.includes(m.id)?"#e94560":"var(--text-muted)",fontSize:FS.s,cursor:"pointer"}}>{m.name}
          </button>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:5,background:"var(--bg-sub)",borderRadius:8,padding:"4px 8px",flexShrink:0,marginLeft:"auto"}}>
        {executeUndo&&(undoStack?.length>0
          ?<button onClick={executeUndo} className="nb" title={`還原：${undoStack[0]?.desc||""}`} style={{color:"#a29bfe",borderColor:"#a29bfe",fontWeight:700,marginRight:4}}>↩ 還原</button>
          :<button className="nb" disabled title="目前沒有可還原的操作" style={{color:"var(--text-dim)",borderColor:"var(--border2)",opacity:0.5,cursor:"not-allowed",marginRight:4}}>↩ 還原</button>
        )}
        <button onClick={()=>{setOvShowSlots(s=>{const next=!s;if(!next)setOvSlotDate(null);return next;});}} className="nb" style={{color:ovShowSlots?"#00b894":"var(--nav-color)",borderColor:ovShowSlots?"#00b894":"var(--border2)"}}>⚡ 選日</button>
        <button onClick={()=>{setOvShowSearch(s=>{const next=!s;if(next)setTimeout(()=>ovSearchInputRef.current?.focus(),80);return next;});setOvSearchQ("");setOvSearchResults([]);}} className="nb" style={{color:ovShowSearch?"#74b9ff":"var(--nav-color)",borderColor:ovShowSearch?"#74b9ff":"var(--border2)"}}>🔍 搜尋</button>
        <button onClick={()=>{
          setYr(today.getFullYear());setMo(today.getMonth());
          setTimeout(()=>{
            const h=today.getHours(),mn=today.getMinutes();
            const tt=h<22?`${String(Math.max(8,h)).padStart(2,"0")}:${mn<30?"00":"30"}`:"09:00";

        <button onClick={()=>{setOvDragMode(p=>!p);setOvIsDraggingVac(false);setOvDragCells(new Set());}} className="nb" style={{color:ovDragMode?"#e94560":"var(--nav-color)",borderColor:ovDragMode?"#e94560":"var(--border2)",fontWeight:ovDragMode?700:400}}>🔴 {ovDragMode?"退出":"休假"}</button>
        <button onClick={()=>{setOvMoveMode(p=>!p);setOvIsDragActive(false);}} className="nb" style={{color:ovMoveMode?"#a29bfe":"var(--nav-color)",borderColor:ovMoveMode?"#a29bfe":"var(--border2)",fontWeight:ovMoveMode?700:400}}>🔀 {ovMoveMode?"退出":"移動"}</button>
        <button onClick={()=>{if(!sel.length)return;const m=sel[0];const d=yr===today.getFullYear()&&mo===today.getMonth()?today.getDate():1;const dateStr=fmtDate(yr,mo,d);const t=TIMES.find(x=>!REST.has(x)&&!bks[`${m.id}__${dateStr}__${x}`])||"09:00";setDialog({master:m,masterId:m.id,dateStr,time:t});setForm({input:"",guests:"1",note:"",color:"none",isSplit:false,splitMasterId:""});}} className="nb" style={{color:"#e94560",borderColor:"#e94560"}}>＋ 新增</button>
        <span style={{fontSize:10,color:"var(--text-dim)"}}>欄</span>
        <input type="range" min="45" max="140" value={ocw} onChange={e=>setOvColW(e.target.value)} style={{width:50,cursor:"pointer",accentColor:"#74b9ff"}} />
        <span style={{fontSize:10,color:"#74b9ff",minWidth:22,fontWeight:700}}>{ocw}</span>
        <span style={{fontSize:10,color:"var(--text-dim)",marginLeft:3}}>高</span>
        <input type="range" min="16" max="44" value={orh} onChange={e=>setOvRowH(e.target.value)} style={{width:42,cursor:"pointer",accentColor:"#00b894"}} />
        <span style={{fontSize:10,color:"#00b894",minWidth:18,fontWeight:700}}>{orh}</span>
      </div>
    </div>

    {/* 搜尋面板 */}
    {ovShowSearch&&<div style={{background:"var(--bg-header)",borderBottom:"1px solid var(--border)",padding:"8px 12px",flexShrink:0}}>
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        <input ref={ovSearchInputRef} value={ovSearchQ} onChange={e=>setOvSearchQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")ovDoSearch(ovSearchQ);}} placeholder="輸入姓名或電話搜尋..." style={{flex:1,padding:"6px 10px",borderRadius:6,background:"var(--input-bg)",border:"1px solid var(--border2)",color:"var(--text-main)",fontSize:13}} />
        <button onClick={()=>ovDoSearch(ovSearchQ)} style={{padding:"6px 14px",background:"#74b9ff",border:"none",borderRadius:6,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>{ovSearchLoading?"搜尋中...":"搜尋"}</button>

      </div>

        {ovSearchResults.map((b,i)=>(
          <div key={b.id||i} onClick={()=>ovJumpToBooking(b)} style={{padding:"8px 12px",borderBottom:"1px solid var(--border)",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(116,185,255,0.08)"}

            <div>
              <div style={{fontSize:13,fontWeight:700,color:"var(--text-main)"}}>{displayName(b.customer_name)}</div>
              <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{b.customer_phone||parseInput(b.raw_input||b.customer_name||"").phone||"無電話"} · <span style={{color:"#a29bfe"}}>{b._masterName||""}</span></div>

              <div style={{fontSize:12,color:"#74b9ff",fontWeight:700}}>{b.date}</div>

            </div>
          </div>

      </div>}
      {ovSearchResults.length===0&&ovSearchQ&&!ovSearchLoading&&<div style={{fontSize:12,color:"var(--text-dim)",textAlign:"center",padding:"8px 0"}}>找不到相關預約</div>}
    </div>}

    {/* 選日空檔面板 */}
    {ovShowSlots&&<div style={{background:"var(--bg-header)",borderBottom:"1px solid var(--border)",padding:"7px 12px",flexShrink:0}}>
      <div style={{marginBottom:5,display:"flex",gap:6,alignItems:"center"}}>
        <span style={{fontSize:12,color:"var(--text-muted)"}}>選擇日期查空檔：</span>
        <input type="date" onClick={e=>e.target.showPicker&&e.target.showPicker()} onChange={e=>{if(!e.target.value)return;const[y,m,d]=e.target.value.split("-").map(Number);setOvSlotDate({y,m:m-1,d});}} style={{background:"var(--input-bg)",border:"1px solid var(--border2)",borderRadius:6,padding:"3px 8px",fontSize:12,color:"var(--text-main)"}} />
      </div>

// ═══════════════════════════════════════════
// CRM MODULE
// ═══════════════════════════════════════════
function CRMModule({masters,FS}){
  const[bks,setBks]=useState([]);
  const[noShowBks,setNoShowBks]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState("");
  const[sel,setSel]=useState(null);
  const[crmTab,setCrmTab]=useState("all");
  const[selMaster,setSelMaster]=useState("all");
  const[noShowEdit,setNoShowEdit]=useState(null);
  const[noShowSaving,setNoShowSaving]=useState(false);
  const[nsToast,setNsToast]=useState(null);
  const msgNs=(m,err)=>{setNsToast({m,err});setTimeout(()=>setNsToast(null),2500);};
  const[renameModal,setRenameModal]=useState(false);
  const[renameNew,setRenameNew]=useState("");
  const[renameSaving,setRenameSaving]=useState(false);
  const[crmToast,setCrmToast]=useState(null);
  const msgCrm=(m,err)=>{setCrmToast({m,err});setTimeout(()=>setCrmToast(null),2800);};

  const reloadNoShow=async()=>{
    let ns=[],from=0;
    while(true){
      const{data,error}=await sb.from("bookings").select("*").eq("status","no_show").order("date",{ascending:false}).range(from,from+999);
      if(error||!data||data.length===0)break;
      ns=[...ns,...data];
      if(data.length<1000)break;
      from+=1000;
    }
    setNoShowBks(ns.filter(b=>b.customer_name&&b.customer_name!=="休假"));
  };

  const[lineBindings,setLineBindings]=useState({});

  useEffect(()=>{
    setLoading(true);
    const fetchAll=async()=>{
      let all=[],from=0;
      while(true){
        const{data,error}=await sb.from("bookings").select("*").neq("status","cancelled").neq("status","no_show").neq("color_tag","vacation").range(from,from+999);
        if(error||!data||data.length===0)break;
        all=[...all,...data];
        if(data.length<1000)break;
        from+=1000;
      }
      setBks(all.filter(b=>b.customer_name&&b.customer_name.trim()&&b.customer_name!=="休假"&&/[\u4e00-\u9fa5a-zA-Z0-9]/.test(b.customer_name)));
      await reloadNoShow();
      // Load LINE bindings
      const{data:lb}=await sb.from("line_bindings").select("phone,display_name,line_user_id");
      const lmap={};
      (lb||[]).forEach(b=>{if(b.phone)lmap[b.phone]={displayName:b.display_name,lineUserId:b.line_user_id};});
      setLineBindings(lmap);
      setLoading(false);
    };
    fetchAll();
  },[]);

  const clientCards=useMemo(()=>{
    // 第一步：解析每筆預約的姓名與電話（含從 customer_name / raw_input 解析電話）
    const parsed=bks.map(b=>{
      let phone=b.customer_phone||"";
      let name=b.customer_name||"";
      if(!phone&&name){
        const p=parseInput(name);
        if(p.phone){phone=p.phone;name=p.name;}
        // 若 parseInput 沒抓到但 displayName 能去掉數字尾巴，仍嘗試用 displayName 清理
        if(!phone){
          // 嘗試更寬鬆的電話解析：找最後一段連續4位以上數字
          const pm=name.match(/(\d{4,})\s*$/);
          if(pm){phone=pm[1];name=name.slice(0,name.lastIndexOf(pm[1])).trim();}
        }
      }
      if(!phone&&b.raw_input){
        const p=parseInput(b.raw_input);
        if(p.phone){phone=p.phone;}
        if(!phone){const pm=b.raw_input.match(/(\d{4,})\s*$/);if(pm)phone=pm[1];}
      }
      // 最終確保 name 不含尾巴的數字電話
      const cleanedName=displayName(name)||name;
      return{...b,_phone:phone,_name:cleanedName};
    });

    // 建立「師傅+純姓名」→ 電話 的映射
    const nameToPhone={};
    parsed.forEach(b=>{
      if(b._phone&&b._name){
        const nk=`${b.master_id}__${b._name}`;
        if(!nameToPhone[nk])nameToPhone[nk]=b._phone;
      }
    });

    // 補齊沒有電話但同名已有電話的紀錄
    const enriched=parsed.map(b=>{
      if(b._phone)return b;
      const nk=`${b.master_id}__${b._name}`;
      const foundPhone=nameToPhone[nk];
      if(foundPhone)return{...b,_phone:foundPhone};
      return b;
    });

    // 第二步：以「師傅+電話」為主鍵建立 map
    const phoneMap={};
    const map={};
    enriched.forEach(b=>{
      if(!b._phone)return;
      const k=`${b.master_id}__${b._phone}`;
      if(!map[k])map[k]={key:k,masterId:b.master_id,masterName:masters.find(x=>x.id===b.master_id)?.name||"?",phone:b._phone,name:b._name,bks:[],isNew:false};
      else if(b._name&&b._name.length>map[k].name.length)map[k].name=b._name;
      phoneMap[`${b.master_id}__${b._name}`]=k;
      map[k].bks.push(b);
      if(b.color_tag==="new_customer")map[k].isNew=true;
    });

    // 第三步：沒有電話的紀錄合併或獨立建卡
    enriched.forEach(b=>{
      if(b._phone)return;
      const nameKey=`${b.master_id}__${b._name}`;
      const existK=phoneMap[nameKey];
      if(existK&&map[existK]){
        map[existK].bks.push(b);
        if(b.color_tag==="new_customer")map[existK].isNew=true;
      }else{
        const k=`${b.master_id}__name__${b._name}`;
        if(!map[k])map[k]={key:k,masterId:b.master_id,masterName:masters.find(x=>x.id===b.master_id)?.name||"?",phone:"",name:b._name,bks:[],isNew:false};
        map[k].bks.push(b);
        if(b.color_tag==="new_customer")map[k].isNew=true;
      }
    });

    const today=getTaipeiNow();
    const todayStr=fmtDate(today.getFullYear(),today.getMonth(),today.getDate());
    return Object.values(map).map(c=>{
      const sorted=c.bks.sort((a,b)=>b.date.localeCompare(a.date));
      const isCrispy=/脆/.test(c.name);
      return{...c,lastDate:sorted[0].date,daysSince:daysBetween(sorted[0].date,todayStr),totalVisits:c.bks.length,isCrispy};
    });
  },[bks,masters]);

  const filtered=useMemo(()=>{
    return clientCards.filter(c=>{
      const ms=!search||c.name?.toLowerCase().includes(search.toLowerCase())||(c.phone||"").includes(search);
      const mm=selMaster==="all"||c.masterId===selMaster;
      if(crmTab==="lost")return ms&&mm&&c.daysSince>30;
      if(crmTab==="freq")return ms&&mm&&c.totalVisits>=4;
      if(crmTab==="crispy")return ms&&mm&&c.isCrispy;
      return ms&&mm;
    }).sort((a,b)=>a.daysSince-b.daysSince);
  },[clientCards,search,selMaster,crmTab]);

  const noShowFiltered=useMemo(()=>noShowBks.filter(b=>{const ms=!search||b.customer_name?.toLowerCase().includes(search.toLowerCase())||(b.customer_phone||"").includes(search);const mm=selMaster==="all"||b.master_id===selMaster;return ms&&mm;}),[noShowBks,search,selMaster]);

  // 取得所有曾用名
  const allNamesForSel=useMemo(()=>{
    if(!sel)return[];
    const names=new Set();
    sel.bks.forEach(b=>{
      const n=(b.customer_name||"").trim();
      const parsed=parseInput(n);
      const cleanName=parsed.phone?parsed.name:n;
      if(cleanName&&cleanName!=="休假")names.add(cleanName);
    });
    names.delete(sel.name);
    return[...names];
  },[sel]);

  // 改名執行
  const doRename=async()=>{
    const newName=renameNew.trim();
    if(!newName||renameSaving)return;
    if(newName===sel.name){setRenameModal(false);return;}
    setRenameSaving(true);
    const ids=sel.bks.map(b=>b.id);
    let updated=0,failed=0;
    const chunkSize=100;
    for(let i=0;i<ids.length;i+=chunkSize){
      const chunk=ids.slice(i,i+chunkSize);
      const{error}=await sb.from("bookings").update({customer_name:newName}).in("id",chunk);
      if(error)failed+=chunk.length;else updated+=chunk.length;
    }
    setRenameSaving(false);
    if(failed===0){
      msgCrm(`✅ 已將 ${updated} 筆預約改名為「${newName}」`);
      setSel(prev=>({...prev,name:newName,bks:prev.bks.map(b=>({...b,customer_name:newName}))}));
      setBks(prev=>prev.map(b=>ids.includes(b.id)?{...b,customer_name:newName}:b));
      setRenameModal(false);setRenameNew("");
    }else{
      msgCrm(`⚠️ 部分失敗（${failed}筆），請重試`,true);
    }
  };

  if(loading)return<div style={{padding:20,textAlign:"center",color:"var(--text-dim)"}}>⏳ 載入客戶資料...</div>;

  // ── 客戶詳情頁 ──
  if(sel){
    const sortedBks=[...sel.bks].sort((a,b)=>b.date.localeCompare(a.date));
    return(
      <div style={{paddingBottom:60,flex:1,overflow:"auto"}}>
        {crmToast&&<div style={{position:"fixed",top:12,left:"50%",transform:"translateX(-50%)",background:crmToast.err?"#e94560":"#00b894",color:"#fff",padding:"8px 20px",borderRadius:20,fontSize:13,fontWeight:700,zIndex:9999,whiteSpace:"nowrap"}}>{crmToast.m}</div>}
        <div style={{padding:"10px 14px",background:"var(--bg-header)",borderBottom:"1px solid var(--border2)",display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setSel(null)} style={{background:"transparent",border:"none",color:"#74b9ff",cursor:"pointer",fontSize:13}}>← 返回</button>
          <span style={{fontSize:13,fontWeight:700,color:"var(--text-muted)"}}>{sel.masterName} 的客戶</span>
        </div>
        <div style={{padding:14}}>
          <div style={{background:"var(--bg-header)",borderRadius:12,padding:16,marginBottom:14,border:"1px solid var(--border2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                  <div style={{fontSize:20,fontWeight:800,cursor:"pointer",userSelect:"none"}}
                    onContextMenu={e=>{e.preventDefault();navigator.clipboard.writeText(sel.name).then(()=>{const el=e.currentTarget;const orig=el.style.color;el.style.color="#00b894";setTimeout(()=>el.style.color=orig,800);});}}
                    onTouchStart={(e)=>{const timer=setTimeout(()=>{navigator.clipboard.writeText(sel.name).then(()=>{const el=e.currentTarget;const orig=el.style.color;el.style.color="#00b894";setTimeout(()=>el.style.color=orig,1000);});},600);e.currentTarget._cpTimer=timer;}}
                    onTouchEnd={(e)=>{clearTimeout(e.currentTarget._cpTimer);}}
                    onTouchMove={(e)=>{clearTimeout(e.currentTarget._cpTimer);}}
                    title="長按複製姓名"
                  >{sel.name}</div>
                  <span style={{fontSize:11,color:"var(--text-dim)",fontWeight:400}}>⟨長按複製⟩</span>
                  <button onClick={()=>{setRenameNew(sel.name);setRenameModal(true);}}
                    style={{padding:"3px 10px",background:"rgba(116,185,255,0.15)",border:"1px solid rgba(116,185,255,0.4)",borderRadius:8,color:"#74b9ff",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                    ✏️ 改名
                  </button>
                </div>
                {allNamesForSel.length>0&&(
                  <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:6,display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                    <span>曾用名：</span>
                    {allNamesForSel.map((n,i)=>(
                      <span key={i} style={{padding:"1px 8px",background:"rgba(255,255,255,0.06)",borderRadius:6,border:"1px solid var(--border2)",color:"var(--text-dim)"}}>{n}</span>
                    ))}
                  </div>
                )}
                <div style={{fontSize:13,color:"var(--text-muted)"}}>📞 {sel.phone||(()=>{const pm=sel.bks.map(b=>b.customer_phone||parseInput(b.customer_name||"").phone).find(p=>p);return pm||"未留電話";})()}</div>
                {(()=>{
                  const phone=sel.phone;
                  const lb=lineBindings[phone];
                  if(!lb) return null;
                  const lineName=lb.displayName;
                  const isDiff=lineName&&lineName!==sel.name&&!sel.name.includes(lineName)&&!lineName.includes(sel.name);
                  return<div style={{marginTop:6}}>
                    <div style={{fontSize:12,color:"#22d3ee",display:"flex",alignItems:"center",gap:6}}>
                      💬 LINE：{lineName||"已綁定（無名稱）"}
                    </div>
                    {isDiff&&<div style={{marginTop:6,background:"rgba(245,166,35,0.12)",border:"1px solid rgba(245,166,35,0.35)",borderRadius:8,padding:"8px 10px"}}>
                      <div style={{fontSize:11,color:"#f5a623",fontWeight:700,marginBottom:6}}>⚠️ LINE名稱「{lineName}」與登記名「{sel.name}」不同</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        <button onClick={async()=>{
                          const ids=sel.bks.map(b=>b.id);
                          for(let i=0;i<ids.length;i+=100){
                            await sb.from("bookings").update({customer_name:lineName}).in("id",ids.slice(i,i+100));
                          }
                          setSel(prev=>({...prev,name:lineName,bks:prev.bks.map(b=>({...b,customer_name:lineName}))}));
                          setBks(prev=>prev.map(b=>ids.includes(b.id)?{...b,customer_name:lineName}:b));
                          msgCrm("✅ 已改為 LINE 名稱："+lineName);
                        }} style={{fontSize:11,padding:"4px 10px",borderRadius:7,background:"rgba(34,211,238,0.15)",border:"1px solid rgba(34,211,238,0.4)",color:"#22d3ee",cursor:"pointer"}}>
                          用 LINE 名稱「{lineName}」
                        </button>
                        <button onClick={()=>{setRenameNew(lineName);setRenameModal(true);}} style={{fontSize:11,padding:"4px 10px",borderRadius:7,background:"rgba(116,185,255,0.1)",border:"1px solid rgba(116,185,255,0.3)",color:"#74b9ff",cursor:"pointer"}}>
                          ✏️ 自訂名稱
                        </button>
                      </div>
                    </div>}
                  </div>;
                })()}
                <div style={{fontSize:12,color:"var(--text-dim)",marginTop:3}}>師傅：{sel.masterName}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
                <div style={{fontSize:13,color:sel.daysSince>90?"#e94560":sel.daysSince>30?"#f5a623":"#00b894",fontWeight:700}}>{sel.daysSince}天前來訪</div>
                <div style={{fontSize:12,color:"#74b9ff",fontWeight:700,marginTop:4}}>{sel.totalVisits}次</div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {sel.isNew&&<span style={{padding:"2px 10px",background:"rgba(245,166,35,0.2)",borderRadius:10,fontSize:11,color:"#f5a623"}}>新客</span>}
              {sel.isCrispy&&<span style={{padding:"3px 12px",background:"rgba(245,166,35,0.25)",borderRadius:10,fontSize:12,color:"#f5a623",border:"1px solid rgba(245,166,35,0.5)",fontWeight:700}}>🫧 脆脆獨立處理</span>}
              {sel.daysSince>30&&<span style={{padding:"2px 10px",background:"rgba(233,69,96,0.15)",borderRadius:10,fontSize:11,color:"#e94560"}}>⚠ 流失風險</span>}
              {sel.daysSince>90&&<span style={{padding:"2px 10px",background:"rgba(245,166,35,0.15)",borderRadius:10,fontSize:11,color:"#f5a623"}}>⚠ 超過3個月</span>}
            </div>
          </div>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:"var(--text-muted)"}}>消費歷程（{sortedBks.length}筆）</div>
          {sortedBks.map(b=>(
            <div key={b.id} style={{display:"flex",gap:10,marginBottom:8,paddingBottom:8,borderBottom:"1px solid var(--border)",alignItems:"flex-start"}}>
              <div style={{width:3,minHeight:36,borderRadius:2,background:b.color_tag==="new_customer"?"#f5a623":"#74b9ff",flexShrink:0}}></div>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:13,fontWeight:700}}>{b.date}</span>
                  <span style={{fontSize:11,color:"var(--text-dim)"}}>{b.start_time?.slice(0,5)}</span>
                </div>
                <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>
                  {b.guest_count>1&&<span>×{b.guest_count}人　</span>}
                  {b.note&&<span>📝 {b.note}</span>}
                </div>
              </div>
              {b.color_tag==="new_customer"&&<span style={{fontSize:10,color:"#f5a623",padding:"1px 6px",border:"1px solid #f5a623",borderRadius:8}}>新</span>}
            </div>
          ))}
        </div>

        {/* 改名 Modal */}
        {renameModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:"0 20px"}} onClick={()=>{if(!renameSaving){setRenameModal(false);setRenameNew("");}}}>
          <div style={{background:"var(--bg-header)",border:"1px solid var(--border2)",borderRadius:18,padding:22,width:"100%",maxWidth:400}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:4,color:"#74b9ff"}}>✏️ 客戶改名</div>
            <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:16}}>將會更新此客戶的所有預約紀錄（共 {sel.bks.length} 筆）</div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:5,fontWeight:600}}>目前姓名</div>
              <div style={{padding:"9px 12px",background:"var(--bg-sub)",borderRadius:8,border:"1px solid var(--border2)",fontSize:14,color:"var(--text-muted)",fontWeight:700}}>{sel.name}</div>
            </div>
            <div style={{marginBottom:6}}>
              <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:5,fontWeight:600}}>新名字</div>
              <input autoFocus value={renameNew} onChange={e=>setRenameNew(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doRename()} placeholder="輸入新名字..."
                style={{width:"100%",padding:"10px 13px",background:"var(--input-bg)",border:"2px solid #74b9ff",borderRadius:10,fontSize:15,color:"var(--text-main)",outline:"none",boxSizing:"border-box"}} />
            </div>
            {allNamesForSel.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:6}}>曾用名（點擊快速填入）</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {allNamesForSel.map((n,i)=>(
                    <button key={i} onClick={()=>setRenameNew(n)}
                      style={{padding:"4px 12px",background:renameNew===n?"rgba(116,185,255,0.25)":"var(--bg-sub)",border:`1px solid ${renameNew===n?"#74b9ff":"var(--border2)"}`,borderRadius:8,color:renameNew===n?"#74b9ff":"var(--text-muted)",fontSize:12,cursor:"pointer",fontWeight:renameNew===n?700:400}}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <div style={{background:"rgba(245,166,35,0.1)",border:"1px solid rgba(245,166,35,0.3)",borderRadius:8,padding:"8px 12px",marginBottom:16,fontSize:11,color:"#f5a623"}}>
              ⚠️ 此操作將直接修改資料庫中所有相關預約的姓名欄位，無法自動還原。
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{if(!renameSaving){setRenameModal(false);setRenameNew("");}}}
                style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid var(--border2)",background:"transparent",color:"var(--text-muted)",fontSize:13,cursor:"pointer"}}>取消</button>
              <button onClick={doRename} disabled={renameSaving||!renameNew.trim()||renameNew.trim()===sel.name}
                style={{flex:2,padding:"11px",borderRadius:10,background:renameSaving||!renameNew.trim()||renameNew.trim()===sel.name?"#333":"#74b9ff",border:"none",color:renameSaving||!renameNew.trim()||renameNew.trim()===sel.name?"#666":"#fff",fontSize:13,fontWeight:700,cursor:renameSaving?"wait":"pointer",transition:"all 0.15s"}}>
                {renameSaving?"改名中...":"✓ 確認改名"}
              </button>
            </div>
          </div>
        </div>}
      </div>
    );
  }

  return(
    <div style={{flex:1,overflow:"auto",background:"var(--bg-main)",paddingBottom:60}}>
      <div style={{padding:10,background:"var(--bg-header)",display:"flex",gap:8}}>
        <input placeholder="🔍 搜尋姓名/電話..." onChange={e=>setSearch(e.target.value)} style={{flex:1,padding:"6px 10px",borderRadius:6,background:"var(--input-bg)",border:"1px solid var(--border2)",color:"var(--text-main)"}} />
        <select value={selMaster} onChange={e=>setSelMaster(e.target.value)} style={{background:"var(--nav-bg)",border:"1px solid var(--border2)",borderRadius:6,padding:"5px 8px",fontSize:12,color:"var(--text-main)"}}>
          <option value="all">全部師傅</option>
          {masters.filter(m=>m.role!=="editor").map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
        </select>
      </div>
      <div style={{display:"flex",background:"var(--bg-header)",borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {[["all",`全部 ${filtered.length}`],["lost","流失>30天"],["freq","常客≥4次"],["crispy","🫧脆脆"]].map(([k,l])=>(
          <button key={k} onClick={()=>setCrmTab(k)} className={`tab-btn${crmTab===k?" active":""}`}
            style={k==="crispy"?{color:crmTab==="crispy"?"#f5a623":"#f5a62388",borderBottomColor:crmTab==="crispy"?"#f5a623":"transparent"}:{}}>{l}</button>
        ))}
        <button onClick={()=>setCrmTab("noshow")} className={`tab-btn${crmTab==="noshow"?" active":""}`} style={{color:crmTab==="noshow"?"#e94560":"#e94560aa",borderBottomColor:crmTab==="noshow"?"#e94560":"transparent"}}>🐦 放鳥 {noShowFiltered.length}</button>
      </div>
      {crmTab==="noshow"&&<>
        {nsToast&&<div style={{position:"fixed",top:12,left:"50%",transform:"translateX(-50%)",background:nsToast.err?"#e94560":"#00b894",color:"#fff",padding:"7px 18px",borderRadius:20,fontSize:12,fontWeight:700,zIndex:9999}}>{nsToast.m}</div>}
        <div style={{padding:8,background:"rgba(233,69,96,0.06)",borderBottom:"1px solid var(--border)",fontSize:11,color:"#e94560"}}>⚠️ 放鳥名單 — 所有人皆可編輯和刪除</div>
        {noShowFiltered.length===0&&<div style={{padding:20,textAlign:"center",color:"var(--text-dim)"}}>無放鳥紀錄</div>}
        {noShowFiltered.map(b=>(
          <div key={b.id} style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:2,color:"#e94560"}}>{displayName(b.customer_name)} <span style={{fontSize:10,background:"rgba(233,69,96,0.15)",padding:"1px 6px",borderRadius:6,color:"#e94560"}}>放鳥</span></div>
              <div style={{fontSize:11,color:"var(--text-muted)"}}>{b.customer_phone||parseInput(b.raw_input||b.customer_name||"").phone||"無電話"} · {b.date} {b.start_time?.slice(0,5)}</div>
              {b.note&&<div style={{fontSize:11,color:"var(--text-dim)"}}>📝 {b.note}</div>}
            </div>
            <div style={{display:"flex",gap:5,flexShrink:0}}>
              <button onClick={()=>setNoShowEdit((()=>{const _raw=b.raw_input||"";const _p=parseInput(_raw);const _pn=parseInput(b.customer_name||"");const _phone=b.customer_phone||_p.phone||_pn.phone||"";const _name=_phone?(_p.phone?_p.name:(_pn.phone?_pn.name:displayName(b.customer_name||""))):displayName(b.customer_name||"");return{id:b.id,customer_name:_name,customer_phone:_phone,note:b.note||""};})())} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #74b9ff",background:"transparent",color:"#74b9ff",fontSize:11,cursor:"pointer",fontWeight:700}}>✏️</button>
              <button onClick={async()=>{if(window.confirm("確定要恢復此客人為一般預約嗎？")){await sb.from("bookings").update({status:"confirmed"}).eq("id",b.id);msgNs("已恢復");reloadNoShow();}}} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #00b894",background:"transparent",color:"#00b894",fontSize:11,cursor:"pointer"}}>恢復</button>
              <button onClick={async()=>{if(window.confirm("確定要永久刪除此筆放鳥記錄嗎？")){await sb.from("bookings").delete().eq("id",b.id);msgNs("已刪除");reloadNoShow();}}} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #e94560",background:"transparent",color:"#e94560",fontSize:11,cursor:"pointer"}}>刪除</button>
            </div>
          </div>
        ))}
        {noShowEdit&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={()=>setNoShowEdit(null)}>
          <div style={{background:"var(--bg-header)",border:"1px solid var(--border2)",borderRadius:16,padding:18,width:"92%",maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:12,color:"#e94560"}}>🐦 編輯放鳥記錄</div>
            {[["customer_name","姓名"],["customer_phone","電話"],["note","備註"]].map(([k,l])=>(
              <div key={k} style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:4}}>{l}</div>
                <input value={noShowEdit[k]} onChange={e=>setNoShowEdit(f=>({...f,[k]:e.target.value}))} style={{width:"100%",background:"var(--input-bg)",border:"1px solid var(--border2)",borderRadius:8,padding:"8px 11px",fontSize:13,color:"var(--text-main)",outline:"none"}} />
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <button onClick={()=>setNoShowEdit(null)} style={{flex:1,padding:10,borderRadius:8,border:"1px solid var(--border2)",background:"transparent",color:"var(--text-muted)",cursor:"pointer"}}>取消</button>
              <button onClick={async()=>{setNoShowSaving(true);const{error}=await sb.from("bookings").update({customer_name:noShowEdit.customer_name,customer_phone:noShowEdit.customer_phone||null,note:noShowEdit.note||null}).eq("id",noShowEdit.id);setNoShowSaving(false);if(!error){msgNs("已更新");setNoShowEdit(null);reloadNoShow();}else msgNs("更新失敗",true);}} disabled={noShowSaving} style={{flex:2,padding:10,borderRadius:8,background:"#74b9ff",border:"none",color:"#fff",fontWeight:700,cursor:"pointer"}}>{noShowSaving?"儲存中...":"儲存變更 ✓"}</button>
            </div>
          </div>
        </div>}
      </>}
      <div style={{display:crmTab==="noshow"?"none":"block"}}>
        {filtered.length===0&&crmTab!=="noshow"&&<div style={{padding:20,textAlign:"center",color:"var(--text-dim)"}}>無資料</div>}
        {filtered.map(c=>(
          <div key={c.key} onClick={()=>setSel(c)} style={{padding:"12px 14px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",cursor:"pointer"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                {c.name} <span style={{fontSize:10,background:"var(--bg-sub)",padding:"2px 6px",borderRadius:6,color:"var(--text-dim)"}}>{c.masterName}</span>
                {c.isCrispy&&<span style={{fontSize:10,background:"rgba(245,166,35,0.2)",padding:"2px 6px",borderRadius:6,color:"#f5a623",border:"1px solid rgba(245,166,35,0.4)"}}>🫧 脆脆獨立</span>}
              </div>
              <div style={{fontSize:12,color:"var(--text-muted)"}}>{c.phone||"無電話"} · 共{c.totalVisits}次</div>
            </div>
            <div style={{textAlign:"right",fontWeight:700,color:c.daysSince>90?"#e94560":c.daysSince>30?"#f5a623":"#00b894"}}>{c.daysSince}天前</div>
          </div>
        ))}
      </div>
    </div>
  );
}
