// ANALYTICS MODULE
// ═══════════════════════════════════════════
function AnalyticsModule({masters,FS,currentMaster}){
  const today=getTaipeiNow();
  // 數據模組用獨立的師傅清單（不受 is_active 過濾）
  const [allMasters, setAllMasters] = useState(masters);
  useEffect(()=>{
    sb.from("masters").select("*").neq("role","editor").then(({data})=>{
      if(data&&data.length>0){
        const ORDER2=["麒","治","泓文","哲瑋"];
        const sorted=[
          ...ORDER2.map(name=>data.find(m=>m.name===name)).filter(Boolean),
          ...data.filter(m=>!ORDER2.includes(m.name))
        ];
        setAllMasters(sorted);
      }
    });
  },[]);
  const ORDER=["麒","治","泓文","哲瑋"];
  const activeMasters=allMasters.length>0?allMasters:[
    ...ORDER.map(name=>masters.find(m=>m.name===name&&m.role!=="editor")).filter(Boolean),
    ...masters.filter(m=>m.role!=="editor"&&!ORDER.includes(m.name))
  ];
  const[anaTab,setAnaTab]=useState("master");
  const[selMasterId,setSelMasterId]=useState(null);
  const[year,setYear]=useState(today.getFullYear());
  const[yearA,setYearA]=useState(today.getFullYear()-1);
  const[yearB,setYearB]=useState(today.getFullYear());
  const[allData,setAllData]=useState([]);

  const[loading,setLoading]=useState(false);
  const[detailMonth,setDetailMonth]=useState(today.getMonth());
  const yearsNeeded=useMemo(()=>[...new Set([year,yearA,yearB])],[year,yearA,yearB]);

  useEffect(()=>{if(activeMasters.length>0&&!selMasterId){const cmInList=currentMaster&&activeMasters.find(m=>m.id===currentMaster.id);setSelMasterId(cmInList?currentMaster.id:activeMasters[0].id);}},[activeMasters.length]);

  useEffect(()=>{
    setLoading(true);
    const fetchYear=async(y)=>{
      let all=[],from=0;
      while(true){
        const{data}=await sb.from("bookings").select("master_id,date,guest_count,color_tag,customer_phone,customer_name").gte("date",`${y}-01-01`).lte("date",`${y}-12-31`).range(from,from+999);
        if(!data||data.length===0)break;
        all=[...all,...data];
        if(data.length<1000)break;
        from+=1000;
      }
      return all;
    };
    Promise.all(yearsNeeded.map(fetchYear)).then(results=>{
      setAllData(results.flat());
      setLoading(false);
    });
  },[yearsNeeded.join(",")]);

  const calcStat=(masterId,y,m)=>{
    const prefix=`${y}-${String(m+1).padStart(2,"0")}`;
    const bks=allData.filter(b=>b.master_id===masterId&&b.date.startsWith(prefix)&&b.color_tag!=="vacation"&&b.customer_name!=="休假"&&b.guest_count!==0);
    const total=bks.reduce((s,b)=>s+(b.guest_count||1),0);
    const newC=bks.filter(b=>b.color_tag==="new_customer").reduce((s,b)=>s+(b.guest_count||1),0);
    // 休假天 = 有vacation紀錄 且 當天完全沒有真實客人（total=0）才算
    const vacDates=[...new Set(allData.filter(b=>b.master_id===masterId&&b.date.startsWith(prefix)&&b.color_tag==="vacation").map(b=>b.date))];
    const realBkDates=new Set(bks.map(b=>b.date));
    const vacDays=vacDates.filter(d=>!realBkDates.has(d)).length;
    return{total,newC,old:total-newC,vacDays};
  };
  const calcYearStat=(masterId,y)=>{let total=0,newC=0,vac=0;for(let m=0;m<12;m++){const s=calcStat(masterId,y,m);total+=s.total;newC+=s.newC;vac+=s.vacDays;}return{total,newC,old:total-newC,vac};};
  const getDayStats=(masterId,y,m)=>{
    const days=new Date(y,m+1,0).getDate();
    return Array.from({length:days},(_,i)=>{
      const d=i+1;
      const dateStr=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const bks=allData.filter(b=>b.master_id===masterId&&b.date===dateStr&&b.guest_count!==0&&b.color_tag!=="vacation"&&b.customer_name!=="休假");
      const hasVac=allData.some(b=>b.master_id===masterId&&b.date===dateStr&&b.color_tag==="vacation");
      const dayTotal=bks.reduce((s,b)=>s+(b.guest_count||1),0);
      const dayNewC=bks.filter(b=>b.color_tag==="new_customer").reduce((s,b)=>s+(b.guest_count||1),0);
      // 只有沒有任何真實客人且有vacation紀錄才顯示休假
      const isVac=hasVac&&dayTotal===0;
      return{d,total:dayTotal,newC:dayNewC,isVac};
    });
  };


  const selMaster=activeMasters.find(m=>m.id===selMasterId)||activeMasters[0];
  const TC={fontSize:11,padding:"5px 6px",textAlign:"center",border:"1px solid var(--border)",color:"var(--text-main)"};
  const TH={...TC,background:"var(--bg-sub)",fontWeight:700,color:"var(--text-muted)",fontSize:10};

  return(
  <div style={{paddingBottom:60,flex:1,overflow:"auto"}}>
    <div style={{display:"flex",background:"var(--bg-header)",borderBottom:"1px solid var(--border2)",overflowX:"auto"}}>
      {[["master","個人明細"],["summary","月度總表"],["yearly","全年對比"]].map(([k,l])=>(
        <button key={k} className={`tab-btn${anaTab===k?" active":""}`} onClick={()=>setAnaTab(k)}>{l}</button>
      ))}
      {loading&&<span style={{fontSize:10,color:"var(--text-dim)",padding:"0 10px",alignSelf:"center"}}>載入中...</span>}
    </div>

    {anaTab==="master"&&<div>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"var(--bg-header)",borderBottom:"1px solid var(--border)",flexWrap:"wrap"}}>
        <button onClick={()=>setYear(y=>y-1)} className="nb">◀</button>
        <span style={{fontWeight:700,fontSize:14}}>{year}年</span>
        <button onClick={()=>setYear(y=>y+1)} className="nb">▶</button>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginLeft:8}}>
          {activeMasters.map(m=>(
            <button key={m.id} onClick={()=>setSelMasterId(m.id)}
              style={{padding:"3px 12px",borderRadius:16,border:`1px solid ${selMasterId===m.id?"#e94560":"var(--border2)"}`,background:selMasterId===m.id?"#e9456022":"transparent",color:selMasterId===m.id?"#e94560":"var(--text-muted)",fontSize:12,cursor:"pointer",fontWeight:selMasterId===m.id?700:400}}>
              {m.name}
            </button>
          ))}
        </div>
      </div>
      {selMaster&&<>
        <div style={{overflowX:"auto",padding:"12px 12px 4px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--text-muted)",marginBottom:8}}>{selMaster.name} — {year}年 每月總覽</div>
          <table style={{borderCollapse:"collapse",width:"100%",minWidth:600}}>
            <thead><tr>
              <th style={{...TH,textAlign:"left",minWidth:50}}>月份</th>
              {MONTHS.map((ml,i)=><th key={i} style={{...TH,minWidth:48}}>{ml}</th>)}
              <th style={{...TH,background:"var(--bg-week)",color:"#74b9ff",minWidth:55}}>全年</th>
            </tr></thead>
            <tbody>
              {[["總客","#74b9ff","total"],["新客","#f5a623","newC"],["舊客","#00b894","old"]].map(([label,color,key])=>(
                <tr key={label}>
                  <td style={{...TC,fontWeight:700,color,textAlign:"left",background:"var(--bg-sub)"}}>{label}</td>
                  {MONTHS.map((_,mi)=>{const s=calcStat(selMasterId,year,mi);const val=s[key];return<td key={mi} style={{...TC,color:val>0?color:"var(--text-dim)",fontWeight:val>0?700:400}}>{val||"—"}</td>;})}
                  <td style={{...TC,background:"var(--bg-week)",fontWeight:800,color,fontSize:12}}>{calcYearStat(selMasterId,year)[key]||"—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{padding:"8px 12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
            <span style={{fontSize:12,fontWeight:700,color:"var(--text-muted)"}}>{selMaster.name} — 每日明細</span>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {MONTHS.map((_,mi)=>(
                <button key={mi} onClick={()=>setDetailMonth(mi)} style={{padding:"2px 8px",borderRadius:12,border:`1px solid ${detailMonth===mi?"#74b9ff":"var(--border2)"}`,background:detailMonth===mi?"#74b9ff22":"transparent",color:detailMonth===mi?"#74b9ff":"var(--text-dim)",fontSize:10,cursor:"pointer"}}>{mi+1}月</button>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
            {getDayStats(selMasterId,year,detailMonth).map(({d,total,newC,isVac})=>(
              <div key={d} style={{background:isVac?"rgba(233,69,96,0.2)":total>0?"var(--bg-header)":"var(--bg-sub)",borderRadius:6,padding:"5px 3px",textAlign:"center",border:`1px solid ${isVac?"#e9456040":newC>0?"#f5a62340":"var(--border)"}`}}>
                <div style={{fontSize:9,color:"var(--text-dim)",marginBottom:2}}>{d}日</div>
                {isVac?<div style={{fontSize:11,color:"#e94560",fontWeight:700}}>休</div>:<div style={{fontSize:14,fontWeight:700,color:total>0?"#74b9ff":"var(--text-dim)"}}>{total||"—"}</div>}
                {newC>0&&<div style={{fontSize:10,color:"#f5c842",fontWeight:900,marginTop:1}}>★新{newC}</div>}
              </div>
            ))}
          </div>
        </div>
      </>}
    </div>}

    {anaTab==="summary"&&<div style={{padding:12}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <button onClick={()=>setYear(y=>y-1)} className="nb">◀</button>
        <span style={{fontWeight:700,fontSize:14}}>{year}年</span>
        <button onClick={()=>setYear(y=>y+1)} className="nb">▶</button>
      </div>
      {[["每月總客數表","total","#74b9ff"],["每月新客總表","newC","#f5a623"],["每月舊客總表","old","#00b894"]].map(([title,key,color])=>(
        <div key={key} style={{marginBottom:16,overflowX:"auto"}}>
          <div style={{fontSize:12,fontWeight:700,color,marginBottom:6}}>{title}</div>
          <table style={{borderCollapse:"collapse",width:"100%",minWidth:500}}>
            <thead><tr>
              <th style={{...TH,textAlign:"left",minWidth:45}}>月份</th>
              {activeMasters.map(m=><th key={m.id} style={{...TH,minWidth:55}}>{m.name}</th>)}
              <th style={{...TH,color,minWidth:60}}>綜合</th>
            </tr></thead>
            <tbody>
              {MONTHS.map((ml,mi)=>{
                const stats=activeMasters.map(m=>calcStat(m.id,year,mi));
                const rowTotal=stats.reduce((s,st)=>s+st[key],0);
                return(<tr key={mi} style={{background:mi%2===0?"var(--bg-main)":"var(--bg-sub)"}}>
                  <td style={{...TC,textAlign:"left",fontWeight:600,color:"var(--text-muted)"}}>{ml}</td>
                  {stats.map((s,si)=><td key={si} style={{...TC,color:s[key]>0?color:"var(--text-dim)",fontWeight:s[key]>0?700:400}}>{s[key]||"—"}</td>)}
                  <td style={{...TC,fontWeight:800,color,background:"var(--bg-week)"}}>{rowTotal||"—"}</td>
                </tr>);
              })}
              <tr style={{background:"var(--bg-week)"}}>
                <td style={{...TC,fontWeight:800,textAlign:"left",color:"var(--text-muted)"}}>合計</td>
                {activeMasters.map(m=>{const ys=calcYearStat(m.id,year);return<td key={m.id} style={{...TC,fontWeight:800,color,fontSize:12}}>{ys[key]||"—"}</td>;})}
                <td style={{...TC,fontWeight:800,color,fontSize:13}}>{activeMasters.reduce((s,m)=>s+calcYearStat(m.id,year)[key],0)||"—"}</td>
              </tr>
            </tbody>
          </table>
        </div>
      ))}
    </div>}

    {anaTab==="yearly"&&<div style={{padding:12}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"var(--text-muted)"}}>對比年份：</span>
        <select value={yearA} onChange={e=>setYearA(Number(e.target.value))} style={{background:"var(--nav-bg)",border:"1px solid var(--border2)",borderRadius:5,padding:"3px 8px",fontSize:12,color:"var(--text-main)"}}>
          {DYNAMIC_YEARS.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <span style={{color:"var(--text-dim)"}}>vs</span>
        <select value={yearB} onChange={e=>setYearB(Number(e.target.value))} style={{background:"var(--nav-bg)",border:"1px solid var(--border2)",borderRadius:5,padding:"3px 8px",fontSize:12,color:"var(--text-main)"}}>
          {DYNAMIC_YEARS.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </div>
      {activeMasters.map(m=>{
        const statsA=Array.from({length:12},(_,mi)=>calcStat(m.id,yearA,mi));
        const statsB=Array.from({length:12},(_,mi)=>calcStat(m.id,yearB,mi));
        const totA=statsA.reduce((s,x)=>s+x.total,0),totB=statsB.reduce((s,x)=>s+x.total,0),diff=totB-totA;
        return(<div key={m.id} style={{marginBottom:16,background:"var(--bg-header)",borderRadius:10,border:"1px solid var(--border2)",overflow:"hidden"}}>
          <div style={{padding:"8px 14px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:700,fontSize:13}}>{m.name}</span>
            <span style={{fontSize:12}}>
              <span style={{color:"#74b9ff"}}>{yearA}:{totA}</span>
              <span style={{color:"var(--text-dim)",margin:"0 6px"}}>→</span>
              <span style={{color:"#f5a623"}}>{yearB}:{totB}</span>
              <span style={{marginLeft:8,color:diff>=0?"#00b894":"#e94560",fontWeight:700}}>{diff>=0?"+":""}{diff}</span>
            </span>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",width:"100%",minWidth:500}}>
              <thead><tr>
                <th style={{...TH,textAlign:"left",minWidth:55}}>月份</th>
                {MONTHS.map((ml,mi)=><th key={mi} style={{...TH,minWidth:42}}>{mi+1}月</th>)}
                <th style={{...TH,minWidth:50}}>全年</th>
              </tr></thead>
              <tbody>
                {[[yearA,"#74b9ff"],[yearB,"#f5a623"]].map(([y,color])=>{
                  const stats=Array.from({length:12},(_,mi)=>calcStat(m.id,y,mi));
                  const yTotal=stats.reduce((s,x)=>s+x.total,0);
                  return(<tr key={y}>
                    <td style={{...TC,fontWeight:700,color,textAlign:"left"}}>{y}年</td>
                    {stats.map((s,mi)=><td key={mi} style={{...TC,color:s.total>0?color:"var(--text-dim)",fontWeight:s.total>0?600:400}}>{s.total||"—"}</td>)}
                    <td style={{...TC,fontWeight:800,color,background:"var(--bg-week)"}}>{yTotal||"—"}</td>
                  </tr>);
                })}
                <tr style={{background:"var(--bg-sub)"}}>
                  <td style={{...TC,fontWeight:700,color:"var(--text-dim)",textAlign:"left",fontSize:10}}>增減</td>
                  {Array.from({length:12},(_,mi)=>{const d=statsB[mi].total-statsA[mi].total;return<td key={mi} style={{...TC,color:d>0?"#00b894":d<0?"#e94560":"var(--text-dim)",fontWeight:d!==0?700:400,fontSize:10}}>{d>0?"+":""}{d||"—"}</td>;})}
                  <td style={{...TC,fontWeight:800,color:diff>=0?"#00b894":"#e94560",background:"var(--bg-week)"}}>{diff>=0?"+":""}{diff}</td>
                </tr>
                {[[yearA,"#74b9ff"],[yearB,"#f5a623"]].map(([y,color])=>{
                  const stats=Array.from({length:12},(_,mi)=>calcStat(m.id,y,mi));
                  const yNew=stats.reduce((s,x)=>s+x.newC,0);
                  return(<tr key={`new${y}`} style={{opacity:0.8}}>
                    <td style={{...TC,fontSize:9,color:"#f5a623",textAlign:"left"}}>{y}新客</td>
                    {stats.map((s,mi)=><td key={mi} style={{...TC,fontSize:9,color:s.newC>0?"#f5a623":"var(--text-dim)"}}>{s.newC||"—"}</td>)}
                    <td style={{...TC,fontSize:10,fontWeight:700,color:"#f5a623",background:"var(--bg-week)"}}>{yNew||"—"}</td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        </div>);
      })}
    </div>}

  </div>
  );
}

// ═══════════════════════════════════════════
// SETTINGS MODULE
// ═══════════════════════════════════════════
function SettingsModule({masters,setMasters,FS,msg}){
  const[settTab,setSettTab]=useState("masters");
  const[editMaster,setEditMaster]=useState(null);
  const[form,setForm]=useState({name:"",username:"",role:"master",display_color:"#74b9ff",reserve_color:"#a29bfe"});
  const[saving,setSaving]=useState(false);
  const[histLogs,setHistLogs]=useState([]);
  const[histLoading,setHistLoading]=useState(false);
  const[histMaster,setHistMaster]=useState("");
  const[histDate,setHistDate]=useState(getTaipeiNow().toISOString().slice(0,10));
  const[restSet,setRestSet]=useState(()=>new Set([...REST]));
  const[restSaved,setRestSaved]=useState(false);

  const loadHistory=async()=>{
    setHistLoading(true);
    let q=sb.from("booking_edit_logs").select("*").order("edited_at",{ascending:false}).limit(100);
    if(histDate)q=q.gte("edited_at",histDate+"T00:00:00").lte("edited_at",histDate+"T23:59:59");
    if(histMaster)q=q.eq("editor_name",histMaster);
    const{data}=await q;
    setHistLogs(data||[]);
    setHistLoading(false);
  };

  const openEdit=(m)=>{setEditMaster(m);setForm({name:m.name||"",username:m.username||"",role:m.role||"master",display_color:m.display_color||"#74b9ff",reserve_color:m.reserve_color||"#a29bfe"});};
  const saveEdit=async()=>{
    if(!editMaster||saving)return;setSaving(true);
    const{error}=await sb.from("masters").update({name:form.name,username:form.username,role:form.role,display_color:form.display_color,reserve_color:form.reserve_color}).eq("id",editMaster.id);
    setSaving(false);
    if(!error){setMasters(prev=>prev.map(m=>m.id===editMaster.id?{...m,...form}:m));setEditMaster(null);msg("已儲存");}
    else msg("儲存失敗",true);
  };
  const toggleActive=async(m)=>{await sb.from("masters").update({is_active:!m.is_active}).eq("id",m.id);setMasters(prev=>prev.map(x=>x.id===m.id?{...x,is_active:!x.is_active}:x));};
  const togglePerm=async(m,field)=>{const val=!m[field];await sb.from("masters").update({[field]:val}).eq("id",m.id);setMasters(prev=>prev.map(x=>x.id===m.id?{...x,[field]:val}:x));};

  return(
  <div style={{flex:1,overflow:"auto"}}>
    <div style={{display:"flex",background:"var(--bg-header)",borderBottom:"1px solid var(--border)"}}>
      {[["masters","帳號管理"],["rest","休息時段"],["export","資料匯出"],["history","歷史紀錄"]].map(([k,l])=>(
        <button key={k} className={`tab-btn${settTab===k?" active":""}`} onClick={()=>{setSettTab(k);if(k==="history")loadHistory();}}>{l}</button>
      ))}
    </div>

    {settTab==="masters"&&<div style={{padding:12}}>
      {masters.map(m=>(
        <div key={m.id} style={{background:"var(--bg-header)",borderRadius:10,padding:"12px 14px",marginBottom:8,border:"1px solid var(--border2)",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:m.display_color||"#74b9ff",flexShrink:0}}></div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13}}>{m.name} <span style={{fontSize:10,color:"var(--text-dim)",background:"var(--bg-sub)",padding:"1px 6px",borderRadius:8}}>{m.role}</span></div>
            <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>@{m.username||"未設定"}</div>
          </div>
          <div style={{display:"flex",gap:4,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {[["CRM",m.can_view_crm,"#00b894","can_view_crm"],["刪除",m.can_delete,"#f5a623","can_delete"],["看他人",m.can_view_others,"#74b9ff","can_view_others"],["全數據",m.can_view_all_stats,"#a29bfe","can_view_all_stats"]].map(([label,active,color,field])=>(
              <button key={label} onClick={()=>togglePerm(m,field)} style={{padding:"3px 8px",borderRadius:6,border:`1px solid ${active?color:"var(--border2)"}`,background:active?`${color}20`:"transparent",color:active?color:"var(--text-dim)",fontSize:10,cursor:"pointer"}}>{label}</button>
            ))}
            <button onClick={()=>openEdit(m)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid var(--border2)",background:"transparent",color:"var(--text-muted)",fontSize:10,cursor:"pointer"}}>編輯</button>
            <button onClick={()=>toggleActive(m)} style={{padding:"3px 8px",borderRadius:6,border:`1px solid ${m.is_active?"#e94560":"var(--border2)"}`,background:m.is_active?"#e9456020":"transparent",color:m.is_active?"#e94560":"var(--text-dim)",fontSize:10,cursor:"pointer"}}>{m.is_active?"啟用":"停用"}</button>
          </div>
        </div>
      ))}
    </div>}

    {settTab==="rest"&&<div style={{padding:12}}>
      <div style={{background:"var(--bg-header)",borderRadius:10,padding:"14px 16px",border:"1px solid var(--border2)",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14}}>休息時段設定</div>
          <button onClick={()=>setRestSet(new Set(DEFAULT_REST))} style={{fontSize:11,padding:"3px 10px",borderRadius:6,border:"1px solid var(--border2)",background:"transparent",color:"var(--text-muted)",cursor:"pointer"}}>還原預設</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}>
          {(()=>{const blocks=[];for(let h=8;h<=22;h++){const t0=`${String(h).padStart(2,"0")}:00`;const t1=`${String(h).padStart(2,"0")}:30`;blocks.push([t0,h<22?t1:null]);}return blocks;})().map(([t0,t1])=>(
            <div key={t0} style={{display:"flex",gap:4}}>
              {[t0,t1].filter(Boolean).map(t=>(
                <button key={t} onClick={()=>setRestSet(prev=>{const n=new Set(prev);n.has(t)?n.delete(t):n.add(t);return n;})}
                  style={{flex:1,padding:"6px 4px",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer",
                    border:`2px solid ${restSet.has(t)?"#e94560":"var(--border2)"}`,
                    background:restSet.has(t)?"rgba(233,69,96,0.15)":"transparent",
                    color:restSet.has(t)?"#e94560":"var(--text-muted)"}}>
                  {t}{restSet.has(t)?" 休":""}
                </button>
              ))}
            </div>
          ))}
        </div>
        <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:10}}>※ 紅色＝休息時段（灰底顯示）　週日不套用</div>
        <button onClick={()=>{REST=restSet;saveRest(restSet);setRestSaved(true);setTimeout(()=>setRestSaved(false),2000);msg("休息時段已儲存");}}
          style={{width:"100%",padding:"10px",borderRadius:8,background:"#e94560",border:"none",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
          {restSaved?"✓ 已儲存":"儲存休息時段"}
        </button>
      </div>
    </div>}

    {settTab==="export"&&<div style={{padding:12}}>
      <div style={{background:"var(--bg-header)",borderRadius:10,padding:"14px 16px",border:"1px solid var(--border2)"}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>資料匯出</div>
        <button onClick={async()=>{
          let all=[],from=0;
          while(true){const{data,error}=await sb.from("bookings").select("*,masters(name)").order("date").order("start_time").range(from,from+999);if(error||!data||data.length===0)break;all=[...all,...data];if(data.length<1000)break;from+=1000;}
          if(!all.length)return;
          const header="日期,時間,師傅,狀態,姓名,電話,人數,顏色,備註\n";
          const rows=all.map(b=>[b.date,b.start_time?.slice(0,5),b.masters?.name||"",b.status||"confirmed",b.customer_name||"",b.customer_phone||"",b.guest_count,b.color_tag,b.note||""].join(",")).join("\n");
          const blob=new Blob(["\ufeff"+header+rows],{type:"text/csv;charset=utf-8"});
          const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`永平預約_${getTaipeiNow().toISOString().slice(0,10)}.csv`;a.click();
        }} style={{padding:"10px 20px",background:"#00b894",border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",width:"100%"}}>📥 下載 CSV</button>
      </div>
    </div>}

    {settTab==="history"&&<div style={{padding:12}}>
      <div style={{background:"var(--bg-header)",borderRadius:10,padding:"12px 14px",border:"1px solid var(--border2)",marginBottom:10}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <input type="date" value={histDate} onChange={e=>setHistDate(e.target.value)} style={{background:"var(--input-bg)",border:"1px solid var(--border2)",borderRadius:6,padding:"5px 8px",fontSize:12,color:"var(--text-main)",flex:1,minWidth:120}} />
          <select value={histMaster} onChange={e=>setHistMaster(e.target.value)} style={{background:"var(--input-bg)",border:"1px solid var(--border2)",borderRadius:6,padding:"5px 8px",fontSize:12,color:"var(--text-main)",flex:1,minWidth:80}}>
            <option value="">全部人員</option>
            {masters.map(m=><option key={m.id} value={m.name}>{m.name}</option>)}
          </select>
          <button onClick={loadHistory} style={{padding:"6px 16px",background:"#74b9ff",border:"none",borderRadius:6,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>{histLoading?"載入中...":"查詢"}</button>
        </div>
      </div>
      {histLogs.length===0&&!histLoading&&<div style={{textAlign:"center",color:"var(--text-dim)",fontSize:13,padding:24}}>尚無紀錄</div>}
      {histLogs.map((l,i)=>(
        <div key={i} style={{background:"var(--bg-header)",borderRadius:8,padding:"10px 12px",marginBottom:6,border:"1px solid var(--border2)"}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--text-main)",marginBottom:4}}>{l.changes_summary}</div>
          <div style={{display:"flex",gap:10,fontSize:11,color:"var(--text-muted)"}}>
            <span style={{color:"#74b9ff",fontWeight:700}}>👤 {l.editor_name}</span>
            {l.date&&<span>📅 {l.date} {l.start_time?.slice(0,5)}</span>}
            <span style={{marginLeft:"auto"}}>{l.edited_at?new Date(l.edited_at).toLocaleString("zh-TW",{timeZone:"Asia/Taipei",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):""}</span>
          </div>
        </div>
      ))}
    </div>}

    {editMaster&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={()=>setEditMaster(null)}>
      <div style={{background:"var(--bg-header)",border:"1px solid var(--border2)",borderRadius:16,padding:20,width:"90%",maxWidth:380}} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>編輯：{editMaster.name}</div>
        {[["name","顯示名稱"],["username","登入帳號"]].map(([k,l])=>(
          <div key={k} style={{marginBottom:10}}>
            <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:4}}>{l}</div>
            <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} style={{width:"100%",background:"var(--input-bg)",border:"1px solid var(--border2)",borderRadius:8,padding:"7px 10px",fontSize:13,color:"var(--text-main)"}} />
          </div>
        ))}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:4}}>角色</div>
          <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} style={{width:"100%",background:"var(--input-bg)",border:"1px solid var(--border2)",borderRadius:8,padding:"7px 10px",fontSize:13,color:"var(--text-main)"}}>
            <option value="master">師傅</option><option value="editor">小編</option><option value="admin">老闆(admin)</option>
          </select>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:4}}>顯示顏色</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="color" value={form.display_color} onChange={e=>setForm(f=>({...f,display_color:e.target.value}))} style={{width:40,height:32,border:"none",cursor:"pointer",borderRadius:6}} />
            <span style={{fontSize:12,color:"var(--text-muted)"}}>{form.display_color}</span>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:4}}>🎨 卡位顏色</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="color" value={form.reserve_color||"#a29bfe"} onChange={e=>setForm(f=>({...f,reserve_color:e.target.value}))} style={{width:40,height:32,border:"none",cursor:"pointer",borderRadius:6}} />
            <span style={{fontSize:12,color:"var(--text-muted)"}}>{form.reserve_color||"#a29bfe"}</span>
            <div style={{width:32,height:20,borderRadius:4,background:form.reserve_color||"#a29bfe",border:"2px solid rgba(255,255,255,0.2)"}}></div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setEditMaster(null)} style={{flex:1,padding:10,borderRadius:8,border:"1px solid var(--border2)",background:"transparent",color:"var(--text-muted)",cursor:"pointer"}}>取消</button>
          <button onClick={saveEdit} disabled={saving} style={{flex:2,padding:10,borderRadius:8,background:"#e94560",border:"none",color:"#fff",fontWeight:700,cursor:"pointer"}}>{saving?"儲存中...":"儲存"}</button>
        </div>
      </div>
    </div>}
  </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err)return(
      <div style={{padding:20,color:"#e94560",background:"#0d1117",minHeight:"100vh"}}>
        <div style={{fontWeight:700,fontSize:18,marginBottom:10}}>⚠️ 載入錯誤</div>
        <div style={{fontFamily:"monospace",fontSize:12,whiteSpace:"pre-wrap",color:"#f5a623"}}>{String(this.state.err)}</div>
        <button onClick={()=>this.setState({err:null})} style={{marginTop:20,padding:"8px 16px",background:"#e94560",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}}>重試</button>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
